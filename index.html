<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>따릉몬 맵</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    @font-face {
      font-family: 'DungGeunMo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #f3f7f7;
      --card: rgba(255, 255, 255, 0.78);
      --line: rgba(19, 39, 31, 0.18);
      --text: #173126;
      --text-soft: #557065;
      --green: #42d77d;
      --green-deep: #1e9256;
      --blue: #74c8ff;
      --gold: #ffd55b;
      --danger: #ff857d;
      --shadow: 0 16px 36px rgba(18, 40, 30, 0.16);
      --blur: blur(18px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DungGeunMo', monospace;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(116, 200, 255, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(66, 215, 125, 0.16), transparent 34%);
      z-index: 0;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #app.claim-active::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255, 213, 91, 0.16), transparent 34%),
        linear-gradient(180deg, rgba(28, 46, 31, 0.06), rgba(28, 46, 31, 0.18));
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      border-radius: 10px 0 0 0;
      font-family: 'DungGeunMo', monospace;
      font-size: 9px;
      padding: 4px 6px;
    }

    .leaflet-control-zoom {
      border: 0;
      box-shadow: var(--shadow);
    }

    .leaflet-control-zoom a {
      border: 0;
      width: 38px;
      height: 38px;
      line-height: 38px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: var(--blur);
    }

    .map-overlay {
      position: absolute;
      z-index: 500;
      pointer-events: none;
    }

    .top-overlay {
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      width: min(248px, calc(100vw - 24px));
      display: grid;
      gap: 8px;
    }

    .top-right-overlay {
      top: max(12px, env(safe-area-inset-top));
      right: 12px;
      width: auto;
    }

    .bottom-overlay {
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      display: grid;
      gap: 8px;
      align-items: start;
    }

    .floating-card {
      pointer-events: auto;
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: var(--blur);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .hud-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
    }

    .hud-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(66, 215, 125, 0.18);
      color: var(--green-deep);
      font-size: 10px;
    }

    .claim-count-card {
      display: grid;
      gap: 3px;
      min-width: 84px;
      padding: 10px 12px;
      text-align: right;
    }

    .claim-count-label {
      font-size: 8px;
      color: var(--text-soft);
    }

    .claim-count-value {
      font-size: 15px;
      color: #8b6200;
      line-height: 1.2;
    }

    .hud-title {
      font-size: 8px;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .hud-value {
      font-size: 11px;
      line-height: 1.45;
    }

    .sub-card {
      display: grid;
      gap: 6px;
      padding: 10px 12px;
    }

    .sub-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 8px;
      color: var(--text-soft);
    }

    .sub-row strong {
      color: var(--text);
      font-size: 9px;
      text-align: right;
      max-width: 58%;
    }

    .status-card {
      display: grid;
      gap: 6px;
      max-width: min(280px, calc(100vw - 96px));
      padding: 10px 12px;
    }

    .status-main {
      font-size: 10px;
      line-height: 1.55;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 10px;
      background: rgba(23, 49, 38, 0.08);
      color: var(--text-soft);
    }

    .actions {
      position: absolute;
      right: 0;
      bottom: 0;
      display: grid;
      gap: 8px;
      justify-items: end;
      pointer-events: auto;
    }

    .action-button {
      border: 0;
      border-radius: 16px;
      padding: 10px 12px;
      font-family: 'DungGeunMo', monospace;
      font-size: 9px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
    }

    .action-button.primary {
      background: rgba(66, 215, 125, 0.22);
      color: var(--green-deep);
    }

    .action-button.claim {
      background: rgba(255, 213, 91, 0.26);
      color: #8b6200;
    }

    .action-button.is-hidden {
      display: none;
    }

    .avatar-marker {
      position: relative;
      width: 48px;
      height: 48px;
    }

    .avatar-shadow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: rgba(66, 215, 125, 0.18);
      box-shadow: 0 0 0 10px rgba(66, 215, 125, 0.12);
    }

    .avatar-center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.96);
      background: var(--green);
      box-shadow: 0 6px 16px rgba(24, 49, 39, 0.24);
    }

    .avatar-image {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -90%);
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 6px 10px rgba(23, 49, 38, 0.18));
      pointer-events: none;
    }

    .station-marker {
      transform: translate(-50%, -80%);
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .station-pin {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 18px rgba(24, 49, 39, 0.16);
    }

    .station-pin.regular {
      background: var(--green);
    }

    .station-pin.sprout {
      background: var(--blue);
    }

    .station-label {
      max-width: 112px;
      padding: 6px 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
      font-size: 9px;
      text-align: center;
      color: var(--text);
      box-shadow: 0 8px 20px rgba(24, 49, 39, 0.12);
    }

    .station-label.claimed {
      border: 1px solid rgba(209, 163, 0, 0.28);
      background: rgba(255, 247, 212, 0.92);
    }

    .station-owner {
      margin-top: 3px;
      font-size: 8px;
      color: #8b6200;
    }

    .totem-marker {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: radial-gradient(circle, var(--gold) 0%, #fff1bf 50%, rgba(255, 255, 255, 0.6) 100%);
      border: 2px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 0 10px rgba(255, 213, 91, 0.14);
      transform: translate(-50%, -50%);
    }

    @media (max-width: 480px) {
      .hud-card {
        grid-template-columns: 1fr;
      }

      .hud-chip {
        justify-self: start;
      }

      .sub-row {
        align-items: flex-start;
      }

      .sub-row strong {
        max-width: 52%;
      }

      .status-card {
        max-width: min(228px, calc(100vw - 92px));
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="map-overlay top-overlay">
      <section class="floating-card hud-card">
        <div>
          <div class="hud-title">내 GPS 위치</div>
          <div class="hud-value" id="coordValue">위치 수신 전</div>
        </div>
        <div class="hud-chip" id="rideState">GPS 대기</div>
      </section>

      <section class="floating-card sub-card">
        <div class="sub-row">
          <span>GPS 정확도</span>
          <strong id="gpsMeta">확인 전</strong>
        </div>
        <div class="sub-row">
          <span>가장 가까운 대여소</span>
          <strong id="stationValue">탐색 중...</strong>
        </div>
        <div class="sub-row">
          <span>근처 대여소 수</span>
          <strong id="nearbyCount">0개</strong>
        </div>
      </section>
    </div>

    <div class="map-overlay top-right-overlay">
      <section class="floating-card claim-count-card">
        <div class="claim-count-label">내 점령 땅</div>
        <div class="claim-count-value" id="claimCountValue">0개</div>
      </section>
    </div>

    <div class="map-overlay bottom-overlay">
      <section class="floating-card status-card">
        <div class="status-main" id="statusMessage">따릉이 대여소 탐색 중...</div>
      </section>

      <div class="actions">
        <button class="action-button claim is-hidden" id="authButton" type="button">대여소 인증하기</button>
        <button class="action-button primary" id="locateButton" type="button">내 위치 리셋</button>
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const SEOUL_CENTER = [37.5665, 126.9780];
    const DEFAULT_ZOOM = 16;
    const DISPLAY_RADIUS_METERS = 1800;
    const TILE_URL = 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png';
    const OFFICIAL_STATION_API = 'https://www.bikeseoul.com/app/station/getStationRealtimeStatus.do';

    const AVATAR_IMAGE =
      "data:image/svg+xml;charset=UTF-8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
          <rect width="72" height="72" fill="none"/>
          <circle cx="36" cy="24" r="10" fill="#ffd9b3" stroke="#173126" stroke-width="4"/>
          <rect x="24" y="34" width="24" height="18" rx="4" fill="#7ccaf8" stroke="#173126" stroke-width="4"/>
          <rect x="12" y="44" width="48" height="10" rx="4" fill="#42d77d" stroke="#173126" stroke-width="4"/>
          <circle cx="18" cy="54" r="8" fill="#ffffff" stroke="#173126" stroke-width="4"/>
          <circle cx="54" cy="54" r="8" fill="#ffffff" stroke="#173126" stroke-width="4"/>
          <rect x="18" y="8" width="12" height="6" fill="#173126"/>
          <rect x="42" y="8" width="12" height="6" fill="#173126"/>
        </svg>
      `);

    const map = L.map('map', {
      zoomControl: false,
      attributionControl: true,
      preferCanvas: true,
    }).setView(SEOUL_CENTER, DEFAULT_ZOOM);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer(TILE_URL, {
      maxZoom: 20,
      attribution:
        '&copy; <a href="https://carto.com/" target="_blank" rel="noreferrer">CARTO</a> ' +
        '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">OpenStreetMap</a>',
      subdomains: 'abcd',
    }).addTo(map);

    const stationLayer = L.layerGroup().addTo(map);
    const claimLayer = L.layerGroup().addTo(map);

    const avatarMarker = L.marker(SEOUL_CENTER, {
      zIndexOffset: 1000,
      icon: L.divIcon({
        className: '',
        html: `
          <div class="avatar-marker">
            <div class="avatar-shadow"></div>
            <div class="avatar-center"></div>
            <img class="avatar-image" src="${AVATAR_IMAGE}" alt="내 아바타">
          </div>
        `,
        iconSize: [48, 48],
        iconAnchor: [24, 24],
      }),
    }).addTo(map);

    const accuracyCircle = L.circle(SEOUL_CENTER, {
      radius: 0,
      color: '#42d77d',
      weight: 1,
      opacity: 0.4,
      fillColor: '#42d77d',
      fillOpacity: 0.08,
    }).addTo(map);

    const rideState = document.getElementById('rideState');
    const coordValue = document.getElementById('coordValue');
    const stationValue = document.getElementById('stationValue');
    const statusMessage = document.getElementById('statusMessage');
    const gpsMeta = document.getElementById('gpsMeta');
    const nearbyCount = document.getElementById('nearbyCount');
    const authButton = document.getElementById('authButton');
    const locateButton = document.getElementById('locateButton');
    const claimCountValue = document.getElementById('claimCountValue');
    const app = document.getElementById('app');

    let watchId = null;
    let hasFirstLock = false;
    let lastLatLng = null;
    let lastAccuracy = 20;
    let stationData = [];
    let stationLoadState = 'idle';
    let currentNearestStation = null;
    let claimLocked = false;
    let claimedStation = null;
    let playerName = localStorage.getItem('ddarungmon-player-name') || '';
    let claimOwners = loadClaimOwners();

    function loadClaimOwners() {
      try {
        const raw = localStorage.getItem('ddarungmon-claims');
        return raw ? JSON.parse(raw) : {};
      } catch (error) {
        console.error(error);
        return {};
      }
    }

    function saveClaimOwners() {
      localStorage.setItem('ddarungmon-claims', JSON.stringify(claimOwners));
    }

    function getClaimInfo(stationId) {
      return claimOwners[stationId] || null;
    }

    function ensurePlayerName() {
      if (playerName) {
        return playerName;
      }

      const nextName = window.prompt('점령자 이름을 입력해주세요.', '라이더')?.trim();

      if (!nextName) {
        return '';
      }

      playerName = nextName;
      localStorage.setItem('ddarungmon-player-name', playerName);
      updateClaimCountHud();
      return playerName;
    }

    function updateClaimCountHud() {
      const myClaimCount = playerName
        ? Object.values(claimOwners).filter((claimInfo) => claimInfo.owner === playerName).length
        : 0;

      claimCountValue.textContent = `${myClaimCount}개`;
    }

    function formatCoords(latlng) {
      return `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
    }

    function getNearestItem(items, latlng) {
      if (!items.length) {
        return null;
      }

      return items
        .map((item) => ({
          ...item,
          distance: map.distance(latlng, item.latlng),
        }))
        .sort((a, b) => a.distance - b.distance)[0];
    }

    function setMapInteractionEnabled(enabled) {
      [
        map.dragging,
        map.touchZoom,
        map.doubleClickZoom,
        map.scrollWheelZoom,
        map.boxZoom,
        map.keyboard,
      ].forEach((handler) => {
        if (!handler) {
          return;
        }

        if (enabled) {
          handler.enable();
        } else {
          handler.disable();
        }
      });

      if (map.tap) {
        if (enabled) {
          map.tap.enable();
        } else {
          map.tap.disable();
        }
      }
    }

    function buildClaimPolygon(latlng, radiusMeters = 92) {
      const baseLat = Array.isArray(latlng) ? latlng[0] : latlng.lat;
      const baseLng = Array.isArray(latlng) ? latlng[1] : latlng.lng;
      const angles = [-90, -28, 35, 95, 155, 212, 270, 330];

      return angles.map((angle) => {
        const radians = (angle * Math.PI) / 180;
        const latOffset = (radiusMeters * Math.sin(radians)) / 111320;
        const lngOffset =
          (radiusMeters * Math.cos(radians)) /
          (111320 * Math.cos((baseLat * Math.PI) / 180));

        return [baseLat + latOffset, baseLng + lngOffset];
      });
    }

    function renderClaimZones() {
      claimLayer.clearLayers();

      stationData.forEach((station) => {
        const claimInfo = getClaimInfo(station.id);

        if (!claimInfo) {
          return;
        }

        L.polygon(buildClaimPolygon(station.latlng), {
          color: '#d1a300',
          weight: 2,
          opacity: 0.96,
          fillColor: '#ffd55b',
          fillOpacity: 0.22,
        }).addTo(claimLayer);

        L.circle(station.latlng, {
          radius: 56,
          color: '#d1a300',
          weight: 1,
          opacity: 0.72,
          fillColor: '#fff1bf',
          fillOpacity: 0.28,
        }).addTo(claimLayer);
      });
    }

    function syncActionButtons() {
      const nearestClaim = currentNearestStation ? getClaimInfo(currentNearestStation.id) : null;

      if (claimLocked && claimedStation) {
        authButton.classList.remove('is-hidden');
        authButton.textContent = '점령 보기 종료';
        return;
      }

      if (nearestClaim) {
        authButton.classList.add('is-hidden');
        return;
      }

      if (currentNearestStation && currentNearestStation.distance <= 120) {
        authButton.classList.remove('is-hidden');
        authButton.textContent = '대여소 인증하기';
        return;
      }

      authButton.classList.add('is-hidden');
    }

    async function fetchOfficialStations() {
      stationLoadState = 'loading';
      stationValue.textContent = '공식 데이터 불러오는 중...';
      nearbyCount.textContent = '-';
      statusMessage.textContent = '따릉이 공식 대여소 데이터를 가져오는 중입니다.';
      currentNearestStation = null;
      syncActionButtons();

      try {
        const response = await fetch(OFFICIAL_STATION_API, {
          method: 'POST',
          mode: 'cors',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
          },
          body: new URLSearchParams({
            stationGrpSeq: 'ALL',
            tabId: '',
          }).toString(),
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        const realtimeList = Array.isArray(data.realtimeList) ? data.realtimeList : [];

        stationData = realtimeList
          .map((station) => {
            const lat = Number(station.stationLatitude);
            const lng = Number(station.stationLongitude);
            const available =
              Number(station.parkingBikeTotCnt || 0) +
              Number(station.parkingQRBikeCnt || 0) +
              Number(station.parkingELECBikeCnt || 0);

            if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
              return null;
            }

            return {
              id: station.stationId,
              name: station.stationName,
              type: station.stationSeCd === 'RAK_001' ? 'regular' : 'sprout',
              available,
              latlng: [lat, lng],
            };
          })
          .filter(Boolean);

        stationLoadState = 'ready';
        renderClaimZones();
        updateClaimCountHud();
        syncActionButtons();
      } catch (error) {
        stationLoadState = 'error';
        stationData = [];
        currentNearestStation = null;
        stationLayer.clearLayers();
        stationValue.textContent = '공식 데이터 연결 실패';
        nearbyCount.textContent = '0개';
        statusMessage.textContent = '공식 따릉이 대여소 데이터를 불러오지 못했습니다. file 환경 또는 네트워크 정책 때문에 차단될 수 있어요.';
        updateClaimCountHud();
        syncActionButtons();
        console.error(error);
      }
    }

    function renderStationsAround(latlng) {
      stationLayer.clearLayers();

      if (!stationData.length) {
        return;
      }

      const sortedStations = stationData
        .map((station) => ({
          ...station,
          distance: map.distance(latlng, station.latlng),
        }))
        .sort((a, b) => a.distance - b.distance);

      const visibleStations = sortedStations.filter((station) => station.distance <= DISPLAY_RADIUS_METERS);
      const stationsToRender = (visibleStations.length > 0 ? visibleStations : sortedStations.slice(0, 10)).slice(0, 12);

      stationsToRender.forEach((station, index) => {
        const claimInfo = getClaimInfo(station.id);
        const marker = L.marker(station.latlng, {
          icon: L.divIcon({
            className: '',
            html: `
              <div class="station-marker">
                <div class="station-pin ${station.type}"></div>
                <div class="station-label ${claimInfo ? 'claimed' : ''}">
                  ${station.name}<br>${Math.round(station.distance)}m · ${station.available}대
                  ${claimInfo ? `<div class="station-owner">${claimInfo.owner} 점령</div>` : ''}
                </div>
              </div>
            `,
            iconSize: [126, 56],
            iconAnchor: [63, 46],
          }),
          zIndexOffset: index === 0 ? 300 : 0,
        });

        marker.bindPopup(
          `${station.name}<br>내 위치에서 ${Math.round(station.distance)}m<br>대여 가능 ${station.available}대` +
          `${claimInfo ? `<br>점령자 ${claimInfo.owner}` : ''}`
        );
        marker.addTo(stationLayer);
      });
    }

    function setStatusForPosition(latlng, accuracy) {
      coordValue.textContent = formatCoords(latlng);
      gpsMeta.textContent = `±${Math.round(accuracy)}m`;

      if (stationLoadState === 'loading') {
        rideState.textContent = '대여소 동기화중';
        stationValue.textContent = '공식 데이터 불러오는 중...';
        nearbyCount.textContent = '-';
        statusMessage.textContent = '공식 따릉이 대여소 데이터를 불러오는 중입니다.';
        return;
      }

      if (stationLoadState === 'error' || !stationData.length) {
        rideState.textContent = 'GPS 고정';
        stationValue.textContent = '공식 데이터 없음';
        nearbyCount.textContent = '0개';
        statusMessage.textContent = 'GPS는 잡혔지만 공식 따릉이 대여소 데이터를 아직 연결하지 못했습니다.';
        return;
      }

      const nearestStation = getNearestItem(stationData, latlng);
      const stationsInRange = stationData.filter((station) => map.distance(latlng, station.latlng) <= DISPLAY_RADIUS_METERS);
      renderStationsAround(latlng);
      currentNearestStation = nearestStation;
      const nearestClaim = getClaimInfo(nearestStation.id);

      if (claimLocked && claimedStation) {
        const claimInfo = getClaimInfo(claimedStation.id);
        stationValue.textContent = `${claimedStation.name} · ${claimInfo ? claimInfo.owner : '점령'} 점령`;
        nearbyCount.textContent = `${stationsInRange.length}개`;
        statusMessage.textContent = `${claimedStation.name}은 이제 ${claimInfo ? claimInfo.owner : '라이더'}의 땅입니다. 지도는 점령 구역을 보여주기 위해 잠시 고정돼 있어요.`;
        rideState.textContent = '거점 점령';
        renderClaimZones();
        syncActionButtons();
        return;
      }

      stationValue.textContent = nearestClaim
        ? `${nearestStation.name} · ${nearestClaim.owner} 점령`
        : `${nearestStation.name} · ${Math.round(nearestStation.distance)}m`;
      nearbyCount.textContent = `${stationsInRange.length}개`;

      if (nearestClaim && nearestStation.distance <= 120) {
        statusMessage.textContent = `${nearestStation.name}은 이미 ${nearestClaim.owner}가 점령한 거점이에요.`;
        rideState.textContent = '점령지 발견';
      } else if (nearestStation.distance <= 120) {
        statusMessage.textContent = `${nearestStation.name} 근처입니다. 따릉이 인증 가능 구간에 진입했어요.`;
        rideState.textContent = '인증 가능';
      } else if (accuracy > 45) {
        statusMessage.textContent = 'GPS 오차가 아직 커요. 잠시 서 있거나 다시 잡기를 눌러 위치를 보정해보세요.';
        rideState.textContent = 'GPS 보정중';
      } else {
        statusMessage.textContent = `${Math.round(nearestStation.distance)}m 앞에 ${nearestStation.name}가 있어요. 가까운 대여소만 지도에 표시 중입니다.`;
        rideState.textContent = 'GPS 고정';
      }

      syncActionButtons();
    }

    function updatePlayer(lat, lng, accuracy) {
      const nextLatLng = L.latLng(lat, lng);
      const movedDistance = lastLatLng ? map.distance(lastLatLng, nextLatLng) : Infinity;

      avatarMarker.setLatLng(nextLatLng);
      accuracyCircle.setLatLng(nextLatLng).setRadius(Math.max(accuracy, 10));
      setStatusForPosition(nextLatLng, accuracy);
      lastAccuracy = accuracy;

      if (!hasFirstLock) {
        map.flyTo(nextLatLng, 17, {
          animate: true,
          duration: 1.4,
        });
        hasFirstLock = true;
      } else if (!claimLocked && (movedDistance >= 4 || accuracy <= 25)) {
        map.panTo(nextLatLng, {
          animate: true,
          duration: 0.8,
          easeLinearity: 0.25,
        });
      }

      lastLatLng = nextLatLng;
    }

    function handleLocationError(message) {
      rideState.textContent = 'GPS 실패';
      statusMessage.textContent = message;
      gpsMeta.textContent = '위치 권한 확인 필요';
      currentNearestStation = null;
      syncActionButtons();
    }

    function startWatchingLocation() {
      if (!navigator.geolocation) {
        handleLocationError('이 브라우저는 GPS를 지원하지 않습니다.');
        return;
      }

      if (watchId != null) {
        navigator.geolocation.clearWatch(watchId);
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          updatePlayer(
            position.coords.latitude,
            position.coords.longitude,
            position.coords.accuracy || 20
          );
        },
        () => {},
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0,
        }
      );

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          updatePlayer(
            position.coords.latitude,
            position.coords.longitude,
            position.coords.accuracy || 20
          );
        },
        () => {
          handleLocationError('위치 권한이 없거나 file 화면에서 GPS가 차단되었습니다. 위치 다시 요청 또는 localhost/https에서 열어보세요.');
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0,
        }
      );
    }

    locateButton.addEventListener('click', () => {
      rideState.textContent = 'GPS 요청 중';
      startWatchingLocation();
    });

    authButton.addEventListener('click', () => {
      if (claimLocked && claimedStation) {
        claimLocked = false;
        claimedStation = null;
        app.classList.remove('claim-active');
        setMapInteractionEnabled(true);
        renderClaimZones();

        if (lastLatLng) {
          setStatusForPosition(lastLatLng, lastAccuracy);
        }

        syncActionButtons();
        return;
      }

      if (!currentNearestStation || currentNearestStation.distance > 120) {
        statusMessage.textContent = '인증 버튼은 대여소 120m 안에 들어왔을 때만 활성화돼요.';
        syncActionButtons();
        return;
      }

      if (getClaimInfo(currentNearestStation.id)) {
        statusMessage.textContent = `${currentNearestStation.name}은 이미 ${getClaimInfo(currentNearestStation.id).owner}가 점령했어요.`;
        syncActionButtons();
        return;
      }

      const ownerName = ensurePlayerName();

      if (!ownerName) {
        statusMessage.textContent = '점령자를 기록하려면 이름이 필요해요.';
        syncActionButtons();
        return;
      }

      claimedStation = currentNearestStation;
      claimOwners[claimedStation.id] = {
        owner: ownerName,
        claimedAt: new Date().toISOString(),
      };
      saveClaimOwners();
      updateClaimCountHud();
      claimLocked = true;
      app.classList.add('claim-active');
      setMapInteractionEnabled(false);
      renderClaimZones();
      map.flyTo(claimedStation.latlng, Math.max(map.getZoom(), 17), {
        animate: true,
        duration: 0.9,
      });
      rideState.textContent = '거점 점령';
      stationValue.textContent = `${claimedStation.name} · ${ownerName} 점령`;
      statusMessage.textContent = `${claimedStation.name} 점령 성공. 이제 이 구역의 점령자는 ${ownerName}입니다.`;
      syncActionButtons();
    });

    updateClaimCountHud();
    fetchOfficialStations();
    startWatchingLocation();
  </script>
</body>
</html>
