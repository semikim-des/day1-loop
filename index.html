<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>따릉몬: 에너토피아</title>
  <style>
    @font-face {
      font-family: 'DungGeunMo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #eef4e8;
      --panel: #f9fff4;
      --panel-soft: #dbead1;
      --line: #1c2e1f;
      --text: #18271b;
      --text-soft: #426347;
      --green: #3fd56e;
      --green-deep: #1e8d4d;
      --mint: #baf1c9;
      --gold: #f5cb57;
      --pink: #ff8cbc;
      --blue: #7ccaf8;
      --danger: #ff7b74;
      --shadow: 4px 4px 0 #1c2e1f;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DungGeunMo', monospace;
    }

    body {
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const STORAGE_KEY = 'ddarungmon_progress_v2';

    const INTRO_STORY = [
      {
        title: '정전',
        body: '화석 연료가 바닥난 뒤, 픽셀 시티의 전력은 완전히 멈췄습니다. 거리의 불빛도, 대여소의 신호도 모두 꺼졌습니다.',
      },
      {
        title: '발전기',
        body: '남은 건 단 하나. 라이더가 페달을 밟을 때 생기는 에너지뿐입니다. 따릉이를 타는 사람만이 도시를 다시 점등할 수 있습니다.',
      },
      {
        title: '출격',
        body: '이제 당신은 동호회의 신입 라이더입니다. 닉네임을 등록하고, 실제 따릉이 대여소 근처에서 인증해 첫 전력을 공급하세요.',
      },
    ];

    const STATIONS = [
      {
        id: 'cityhall',
        code: '102',
        name: '서울광장 대여소',
        lat: 37.5663,
        lng: 126.9779,
        bikeType: '일반 따릉이',
        available: 9,
        racks: 17,
      },
      {
        id: 'seongsu',
        code: '214',
        name: '성수역 대여소',
        lat: 37.5446,
        lng: 127.0557,
        bikeType: '새싹 따릉이',
        available: 4,
        racks: 12,
      },
      {
        id: 'yeouido',
        code: '307',
        name: '여의나루 대여소',
        lat: 37.5271,
        lng: 126.9326,
        bikeType: '일반 따릉이',
        available: 13,
        racks: 20,
      },
    ];

    const STEP_ORDER = ['intro', 'nickname', 'gps', 'receipt'];

    const STEP_LABELS = {
      intro: '인트로',
      nickname: '닉네임',
      gps: 'GPS 인증',
      receipt: '인증샷 이벤트',
    };

    const calculateDistance = (lat1, lon1, lat2, lon2) => {
      const R = 6371000;
      const dLat = (lat2 - lat1) * (Math.PI / 180);
      const dLon = (lon2 - lon1) * (Math.PI / 180);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * (Math.PI / 180)) *
          Math.cos(lat2 * (Math.PI / 180)) *
          Math.sin(dLon / 2) *
          Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    };

    const getRandomEvent = () => {
      const roll = Math.random();

      if (roll < 0.1) {
        return {
          title: '황금 도토리 획득',
          body: '희귀 코스튬 교환권 조각을 얻었습니다. 동호회 내 자랑용으로 딱 좋은 초희귀 드롭입니다.',
          color: '#f5cb57',
          points: 120,
        };
      }

      if (roll < 0.45) {
        return {
          title: '강풍 주의보 버프',
          body: '역풍을 이겨낸 라이더 판정으로 추가 가점이 적용됩니다.',
          color: '#7ccaf8',
          points: 70,
        };
      }

      return {
        title: '화이트 네온 정비',
        body: '따릉이 프레임 정비 보너스로 다음 주행 점수가 안정적으로 누적됩니다.',
        color: '#3fd56e',
        points: 40,
      };
    };

    function PixelBike() {
      return (
        <div style={styles.pixelWrap}>
          <div style={styles.pixelWheelLeft} />
          <div style={styles.pixelWheelRight} />
          <div style={styles.pixelFrameMain} />
          <div style={styles.pixelFrameDown} />
          <div style={styles.pixelFrameSeat} />
          <div style={styles.pixelHandle} />
          <div style={styles.pixelSeat} />
          <div style={styles.pixelRiderHead} />
          <div style={styles.pixelRiderBody} />
          <div style={styles.pixelRiderArm} />
          <div style={styles.pixelRiderLeg} />
          <div style={styles.pixelBag} />
        </div>
      );
    }

    function ProgressBar({ currentStep }) {
      const currentIndex = STEP_ORDER.indexOf(currentStep);

      return (
        <div style={styles.progressBar}>
          {STEP_ORDER.map((step, index) => {
            const active = index <= currentIndex;
            return (
              <div key={step} style={styles.progressItem}>
                <div
                  style={{
                    ...styles.progressDot,
                    background: active ? '#3fd56e' : '#d1ddcb',
                    color: active ? '#18271b' : '#6f8573',
                  }}
                >
                  {index + 1}
                </div>
                <div style={styles.progressLabel}>{STEP_LABELS[step]}</div>
              </div>
            );
          })}
        </div>
      );
    }

    function GameApp() {
      const savedProgress = React.useMemo(() => {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        } catch (error) {
          return null;
        }
      }, []);

      const [step, setStep] = React.useState(savedProgress?.step || 'intro');
      const [introIndex, setIntroIndex] = React.useState(savedProgress?.introIndex || 0);
      const [nickname, setNickname] = React.useState(savedProgress?.nickname || '');
      const [nicknameInput, setNicknameInput] = React.useState(savedProgress?.nickname || '');
      const [userLocation, setUserLocation] = React.useState(null);
      const [locationError, setLocationError] = React.useState('');
      const [stationQuery, setStationQuery] = React.useState('');
      const [stationStatus, setStationStatus] = React.useState(() => STATIONS.map((station) => ({ ...station })));
      const [score, setScore] = React.useState(savedProgress?.score || 0);
      const [energy, setEnergy] = React.useState(savedProgress?.energy || 0);
      const [gpsChecked, setGpsChecked] = React.useState(savedProgress?.gpsChecked || false);
      const [receiptFile, setReceiptFile] = React.useState(null);
      const [eventReward, setEventReward] = React.useState(savedProgress?.eventReward || null);
      const [activityLog, setActivityLog] = React.useState(
        savedProgress?.activityLog || ['시스템 준비 완료. 첫 주행 인증을 기다리는 중입니다.']
      );

      React.useEffect(() => {
        const watchId = navigator.geolocation?.watchPosition(
          (position) => {
            setUserLocation({
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            });
            setLocationError('');
          },
          () => {
            setLocationError('위치 권한이 꺼져 있어 GPS 판정이 제한됩니다.');
          },
          {
            enableHighAccuracy: true,
            timeout: 6000,
            maximumAge: 1500,
          }
        );

        if (!navigator.geolocation) {
          setLocationError('이 브라우저는 GPS를 지원하지 않습니다.');
        }

        return () => {
          if (watchId != null && navigator.geolocation) {
            navigator.geolocation.clearWatch(watchId);
          }
        };
      }, []);

      React.useEffect(() => {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            step,
            introIndex,
            nickname,
            score,
            energy,
            gpsChecked,
            eventReward,
            activityLog,
          })
        );
      }, [step, introIndex, nickname, score, energy, gpsChecked, eventReward, activityLog]);

      const stationsWithDistance = stationStatus.map((station) => {
        if (!userLocation) {
          return { ...station, distance: null };
        }

        return {
          ...station,
          distance: calculateDistance(userLocation.lat, userLocation.lng, station.lat, station.lng),
        };
      }).sort((a, b) => {
        if (a.distance == null) return 1;
        if (b.distance == null) return -1;
        return a.distance - b.distance;
      });

      const nearestStation = stationsWithDistance[0];
      const canCheckGps = nearestStation?.distance != null && nearestStation.distance <= 120;
      const filteredStations = stationsWithDistance.filter((station) =>
        station.name.toLowerCase().includes(stationQuery.trim().toLowerCase())
      );

      const appendLog = (message) => {
        setActivityLog((prev) => [message, ...prev].slice(0, 5));
      };

      const handleRefreshStations = () => {
        setStationStatus((prev) =>
          prev.map((station) => {
            const diff = Math.floor(Math.random() * 5) - 2;
            const available = Math.max(0, Math.min(station.racks, station.available + diff));
            return { ...station, available };
          })
        );
        appendLog('대여소 실시간 현황을 새로고침했습니다.');
      };

      const handleIntroNext = () => {
        if (introIndex < INTRO_STORY.length - 1) {
          setIntroIndex((prev) => prev + 1);
          return;
        }

        setStep('nickname');
      };

      const handleNicknameSubmit = () => {
        const trimmed = nicknameInput.trim();
        if (!trimmed) {
          return;
        }

        setNickname(trimmed);
        setStep('gps');
        appendLog(`${trimmed} 라이더 등록 완료. 첫 대여소 인증 미션이 열렸습니다.`);
      };

      const handleGpsCheck = () => {
        if (!canCheckGps || gpsChecked) {
          return;
        }

        setScore((prev) => prev + 100);
        setEnergy((prev) => prev + 60);
        setGpsChecked(true);
        setStep('receipt');
        appendLog(`${nearestStation.name} 근처 인증 성공. 주행 가점 100점이 반영되었습니다.`);
      };

      const handleReceiptUpload = () => {
        if (!receiptFile) {
          return;
        }

        const reward = getRandomEvent();
        setEventReward(reward);
        setScore((prev) => prev + reward.points);
        setEnergy((prev) => prev + Math.round(reward.points / 2));
        appendLog(`결제 인증샷 등록 완료. 이벤트 '${reward.title}' 발동.`);
      };

      const resetProgress = () => {
        localStorage.removeItem(STORAGE_KEY);
        window.location.reload();
      };

      const introCard = INTRO_STORY[introIndex];

      return (
        <div style={styles.app}>
          <main style={styles.shell}>
            <header style={styles.header}>
              <div>
                <div style={styles.eyebrow}>DDARUNGMON</div>
                <h1 style={styles.title}>에너토피아</h1>
              </div>
              <button style={styles.resetButton} onClick={resetProgress}>
                리셋
              </button>
            </header>

            <ProgressBar currentStep={step} />

            <section style={styles.heroCard}>
              <div style={styles.heroVisual}>
                <PixelBike />
              </div>
              <div style={styles.heroText}>
                <div style={styles.heroName}>{nickname ? `${nickname} 라이더` : '신입 라이더'}</div>
                <div style={styles.heroStats}>
                  <span>점수 {score}P</span>
                  <span>에너지 {energy}EP</span>
                </div>
              </div>
            </section>

            {step === 'intro' && (
              <section style={styles.panel}>
                <div style={styles.storyTag}>스토리 시작</div>
                <h2 style={styles.panelTitle}>{introCard.title}</h2>
                <p style={styles.panelBody}>{introCard.body}</p>
                <button style={styles.primaryButton} onClick={handleIntroNext}>
                  {introIndex < INTRO_STORY.length - 1 ? '다음 장면' : '닉네임 설정하러 가기'}
                </button>
              </section>
            )}

            {step === 'nickname' && (
              <section style={styles.panel}>
                <div style={styles.storyTag}>캐릭터 등록</div>
                <h2 style={styles.panelTitle}>라이더 닉네임 설정</h2>
                <p style={styles.panelBody}>
                  동호회 랭킹과 이벤트 로그에 표시될 이름입니다. 짧고 기억에 남는 이름이 좋습니다.
                </p>
                <input
                  type="text"
                  value={nicknameInput}
                  onChange={(event) => setNicknameInput(event.target.value)}
                  placeholder="예: 성수픽서, 한강왕"
                  style={styles.textInput}
                  maxLength={12}
                />
                <button
                  style={{
                    ...styles.primaryButton,
                    opacity: nicknameInput.trim() ? 1 : 0.45,
                  }}
                  onClick={handleNicknameSubmit}
                  disabled={!nicknameInput.trim()}
                >
                  닉네임 확정
                </button>
              </section>
            )}

            {step === 'gps' && (
              <section style={styles.panel}>
                <div style={styles.storyTag}>첫 미션</div>
                <h2 style={styles.panelTitle}>대여소 근처에서 GPS 인증</h2>
                <p style={styles.panelBody}>
                  실제 따릉이 대여소 120m 이내에서만 인증 버튼이 활성화됩니다. 자동 적립이 아니라 직접 눌러야 가점이 들어갑니다.
                </p>

                <div style={styles.mapActions}>
                  <input
                    type="text"
                    value={stationQuery}
                    onChange={(event) => setStationQuery(event.target.value)}
                    placeholder="대여소 이름 검색"
                    style={styles.searchInput}
                  />
                  <button style={styles.secondaryButton} onClick={handleRefreshStations}>
                    새로고침
                  </button>
                </div>

                <div style={styles.legendRow}>
                  <span style={styles.legendChip('#3fd56e')}>일반 따릉이</span>
                  <span style={styles.legendChip('#7ccaf8')}>새싹 따릉이</span>
                </div>

                <div style={styles.statusCard}>
                  <div style={styles.statusTitle}>가장 가까운 대여소</div>
                  <div style={styles.statusMain}>{nearestStation?.name || '위치 확인 중'}</div>
                  <div style={styles.statusSub}>
                    {nearestStation?.distance != null
                      ? `${Math.round(nearestStation.distance)}m 떨어져 있습니다.`
                      : 'GPS 좌표를 기다리는 중입니다.'}
                  </div>
                </div>

                <div style={styles.stationBoard}>
                  <div style={styles.stationBoardHeader}>
                    공식 따릉이 대여소 안내 페이지처럼 검색 후 대여 가능 수를 확인하는 흐름으로 정리했습니다.
                  </div>
                  <div style={styles.stationList}>
                  {filteredStations.map((station) => (
                    <div key={station.id} style={styles.stationItem}>
                      <div>
                        <div style={styles.stationName}>#{station.code} {station.name}</div>
                        <div style={styles.stationMeta}>
                          {station.distance == null ? '거리 계산 전' : `${Math.round(station.distance)}m`} · 거치대 {station.racks}칸
                        </div>
                      </div>
                      <div style={styles.stationInfoGroup}>
                        <div
                          style={{
                            ...styles.typeBadge,
                            background: station.bikeType === '일반 따릉이' ? '#3fd56e' : '#7ccaf8',
                          }}
                        >
                          {station.bikeType}
                        </div>
                        <div
                          style={{
                            ...styles.stationBadge,
                            background: station.distance != null && station.distance <= 120 ? '#3fd56e' : '#dbead1',
                          }}
                        >
                          자전거 {station.available}대
                        </div>
                      </div>
                    </div>
                  ))}
                  {filteredStations.length === 0 && (
                    <div style={styles.emptyState}>검색 결과가 없습니다.</div>
                  )}
                  </div>
                </div>

                {locationError && <div style={styles.warning}>{locationError}</div>}

                <button
                  style={{
                    ...styles.primaryButton,
                    background: canCheckGps ? '#3fd56e' : '#c2d0be',
                    color: canCheckGps ? '#18271b' : '#6a7e6f',
                  }}
                  disabled={!canCheckGps || gpsChecked}
                  onClick={handleGpsCheck}
                >
                  {gpsChecked ? '인증 완료' : '현 위치 인증하기'}
                </button>
              </section>
            )}

            {step === 'receipt' && (
              <section style={styles.panel}>
                <div style={styles.storyTag}>보너스 이벤트</div>
                <h2 style={styles.panelTitle}>결제 인증샷 등록</h2>
                <p style={styles.panelBody}>
                  나중에 결제 인증샷을 올리면 보너스 이벤트가 발동합니다. 지금은 프로토타입 단계라 업로드만으로 랜덤 이벤트가 발생하도록 넣어두었습니다.
                </p>

                <div style={styles.rewardSummary}>
                  <div>기본 인증 완료 보상: 100P</div>
                  <div>추가 이벤트: 희귀 아이템 또는 버프</div>
                </div>

                <input
                  type="file"
                  accept="image/*"
                  onChange={(event) => setReceiptFile(event.target.files?.[0] || null)}
                  style={styles.fileInput}
                />

                <button
                  style={{
                    ...styles.primaryButton,
                    opacity: receiptFile ? 1 : 0.45,
                  }}
                  disabled={!receiptFile}
                  onClick={handleReceiptUpload}
                >
                  결제 인증샷 등록
                </button>

                {eventReward && (
                  <div style={{ ...styles.eventCard, borderColor: eventReward.color }}>
                    <div style={{ ...styles.eventTitle, color: eventReward.color }}>{eventReward.title}</div>
                    <div style={styles.eventBody}>{eventReward.body}</div>
                    <div style={styles.eventPoints}>추가 보상 +{eventReward.points}P</div>
                  </div>
                )}
              </section>
            )}

            <section style={styles.logPanel}>
              <div style={styles.logTitle}>진행 로그</div>
              {activityLog.map((entry, index) => (
                <div key={`${entry}-${index}`} style={styles.logItem}>
                  {entry}
                </div>
              ))}
            </section>
          </main>
        </div>
      );
    }

    const styles = {
      app: {
        minHeight: '100vh',
        padding: '18px 14px 28px',
      },
      shell: {
        maxWidth: 420,
        margin: '0 auto',
      },
      header: {
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'flex-start',
        gap: 12,
        marginBottom: 14,
      },
      eyebrow: {
        fontSize: 10,
        color: '#426347',
        marginBottom: 4,
      },
      title: {
        margin: 0,
        fontSize: 28,
        lineHeight: 1.1,
      },
      resetButton: {
        border: '3px solid #1c2e1f',
        background: '#f9fff4',
        color: '#18271b',
        padding: '10px 12px',
        boxShadow: '4px 4px 0 #1c2e1f',
      },
      progressBar: {
        display: 'grid',
        gridTemplateColumns: 'repeat(4, 1fr)',
        gap: 8,
        marginBottom: 14,
      },
      progressItem: {
        display: 'grid',
        gap: 6,
        justifyItems: 'center',
        textAlign: 'center',
      },
      progressDot: {
        width: 34,
        height: 34,
        border: '3px solid #1c2e1f',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        fontSize: 12,
      },
      progressLabel: {
        fontSize: 10,
        lineHeight: 1.3,
        color: '#426347',
      },
      heroCard: {
        display: 'grid',
        gridTemplateColumns: '120px 1fr',
        gap: 14,
        alignItems: 'center',
        padding: 14,
        background: '#dbead1',
        border: '3px solid #1c2e1f',
        boxShadow: '4px 4px 0 #1c2e1f',
        marginBottom: 14,
      },
      heroVisual: {
        minHeight: 96,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
      },
      heroText: {
        display: 'grid',
        gap: 8,
      },
      heroName: {
        fontSize: 18,
        lineHeight: 1.3,
      },
      heroStats: {
        display: 'flex',
        flexWrap: 'wrap',
        gap: 8,
        fontSize: 11,
        color: '#426347',
      },
      panel: {
        background: '#f9fff4',
        border: '3px solid #1c2e1f',
        boxShadow: '4px 4px 0 #1c2e1f',
