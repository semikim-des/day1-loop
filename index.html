<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>따릉몬 맵</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    @font-face {
      font-family: 'DungGeunMo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #f3f7f7;
      --card: rgba(255, 255, 255, 0.78);
      --line: rgba(19, 39, 31, 0.18);
      --text: #173126;
      --text-soft: #557065;
      --green: #42d77d;
      --green-deep: #1e9256;
      --blue: #74c8ff;
      --gold: #ffd55b;
      --danger: #ff857d;
      --shadow: 0 16px 36px rgba(18, 40, 30, 0.16);
      --blur: blur(18px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DungGeunMo', monospace;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(116, 200, 255, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(66, 215, 125, 0.16), transparent 34%);
      z-index: 0;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      border-radius: 10px 0 0 0;
      font-family: 'DungGeunMo', monospace;
      font-size: 9px;
      padding: 4px 6px;
    }

    .leaflet-control-zoom {
      border: 0;
      box-shadow: var(--shadow);
    }

    .leaflet-control-zoom a {
      border: 0;
      width: 38px;
      height: 38px;
      line-height: 38px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: var(--blur);
    }

    .map-overlay {
      position: absolute;
      left: 16px;
      right: 16px;
      z-index: 500;
      pointer-events: none;
    }

    .top-overlay {
      top: max(16px, env(safe-area-inset-top));
      display: grid;
      gap: 10px;
    }

    .bottom-overlay {
      bottom: max(16px, env(safe-area-inset-bottom));
      display: grid;
      gap: 10px;
    }

    .floating-card {
      pointer-events: auto;
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: var(--blur);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .hud-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
    }

    .hud-title {
      font-size: 11px;
      color: var(--text-soft);
      margin-bottom: 6px;
    }

    .hud-value {
      font-size: 18px;
      line-height: 1.3;
    }

    .hud-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      min-height: 42px;
      padding: 8px 12px;
      border-radius: 16px;
      background: rgba(66, 215, 125, 0.18);
      color: var(--green-deep);
      font-size: 14px;
    }

    .sub-card {
      display: grid;
      gap: 8px;
      padding: 14px 16px;
    }

    .sub-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      font-size: 11px;
      color: var(--text-soft);
    }

    .sub-row strong {
      color: var(--text);
      font-size: 12px;
      text-align: right;
    }

    .status-card {
      display: grid;
      gap: 10px;
      padding: 16px;
    }

    .status-title {
      font-size: 12px;
      color: var(--text-soft);
    }

    .status-main {
      font-size: 16px;
      line-height: 1.45;
    }

    .status-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 10px;
      background: rgba(23, 49, 38, 0.08);
      color: var(--text-soft);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    .action-button {
      border: 0;
      border-radius: 18px;
      padding: 12px 14px;
      font-family: 'DungGeunMo', monospace;
      font-size: 11px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
    }

    .action-button.primary {
      background: rgba(66, 215, 125, 0.22);
      color: var(--green-deep);
    }

    .action-button.warn {
      background: rgba(255, 133, 125, 0.18);
      color: #a74640;
    }

    .avatar-marker {
      position: relative;
      width: 68px;
      height: 68px;
      transform: translate(-50%, -62%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-shadow {
      position: absolute;
      left: 50%;
      bottom: 6px;
      width: 34px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(23, 49, 38, 0.18);
      filter: blur(6px);
    }

    .avatar-glow {
      position: absolute;
      inset: 14px;
      border-radius: 999px;
      background: rgba(66, 215, 125, 0.18);
      filter: blur(10px);
    }

    .avatar-image {
      position: relative;
      width: 42px;
      height: 42px;
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 10px rgba(23, 49, 38, 0.18));
    }

    .station-marker {
      transform: translate(-50%, -80%);
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .station-pin {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 18px rgba(24, 49, 39, 0.16);
    }

    .station-pin.regular {
      background: var(--green);
    }

    .station-pin.sprout {
      background: var(--blue);
    }

    .station-label {
      max-width: 112px;
      padding: 6px 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
      font-size: 9px;
      text-align: center;
      color: var(--text);
      box-shadow: 0 8px 20px rgba(24, 49, 39, 0.12);
    }

    .totem-marker {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: radial-gradient(circle, var(--gold) 0%, #fff1bf 50%, rgba(255, 255, 255, 0.6) 100%);
      border: 2px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 0 0 10px rgba(255, 213, 91, 0.14);
      transform: translate(-50%, -50%);
    }

    @media (max-width: 480px) {
      .hud-card {
        grid-template-columns: 1fr;
      }

      .hud-chip {
        justify-self: start;
      }

      .sub-row {
        align-items: flex-start;
      }

      .sub-row strong {
        max-width: 48%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="map-overlay top-overlay">
      <section class="floating-card hud-card">
        <div>
          <div class="hud-title">현재 에너지</div>
          <div class="hud-value" id="energyValue">100⚡</div>
        </div>
        <div class="hud-chip" id="rideState">GPS 대기</div>
      </section>

      <section class="floating-card sub-card">
        <div class="sub-row">
          <span>내 위치</span>
          <strong id="coordValue">위치 수신 전</strong>
        </div>
        <div class="sub-row">
          <span>가장 가까운 대여소</span>
          <strong id="stationValue">탐색 중...</strong>
        </div>
      </section>
    </div>

    <div class="map-overlay bottom-overlay">
      <section class="floating-card status-card">
        <div class="status-title">탐색 메시지</div>
        <div class="status-main" id="statusMessage">근처 토템 탐색 중...</div>
        <div class="status-meta">
          <span class="pill" id="gpsMeta">GPS 오프라인</span>
          <span class="pill" id="totemMeta">토템 거리 계산 중</span>
        </div>
      </section>

      <div class="actions">
        <button class="action-button primary" id="locateButton" type="button">내 위치 다시 잡기</button>
        <button class="action-button" id="themeButton" type="button">다크 맵 전환</button>
        <button class="action-button warn" id="demoButton" type="button">샘플 위치로 보기</button>
      </div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const SEOUL_CENTER = [37.5665, 126.9780];
    const DEFAULT_ZOOM = 16;

    const STADIA_THEMES = {
      light: 'https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png',
      dark: 'https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png',
    };

    const STATION_DATA = [
      {
        id: '102',
        name: '서울광장 대여소',
        type: 'regular',
        available: 9,
        latlng: [37.5663, 126.9779],
      },
      {
        id: '214',
        name: '성수역 대여소',
        type: 'sprout',
        available: 4,
        latlng: [37.5446, 127.0557],
      },
      {
        id: '307',
        name: '여의나루 대여소',
        type: 'regular',
        available: 13,
        latlng: [37.5271, 126.9326],
      },
      {
        id: '418',
        name: '반포한강공원 대여소',
        type: 'regular',
        available: 11,
        latlng: [37.5102, 126.9953],
      },
    ];

    const TOTEMS = [
      { id: 'totem-1', name: '황금 도토리', latlng: [37.5660, 126.9796] },
      { id: 'totem-2', name: '네온 기어', latlng: [37.5442, 127.0547] },
      { id: 'totem-3', name: '새싹 배터리', latlng: [37.5265, 126.9337] },
    ];

    const AVATAR_IMAGE =
      "data:image/svg+xml;charset=UTF-8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
          <rect width="72" height="72" fill="none"/>
          <circle cx="36" cy="24" r="10" fill="#ffd9b3" stroke="#173126" stroke-width="4"/>
          <rect x="24" y="34" width="24" height="18" rx="4" fill="#7ccaf8" stroke="#173126" stroke-width="4"/>
          <rect x="12" y="44" width="48" height="10" rx="4" fill="#42d77d" stroke="#173126" stroke-width="4"/>
          <circle cx="18" cy="54" r="8" fill="#ffffff" stroke="#173126" stroke-width="4"/>
          <circle cx="54" cy="54" r="8" fill="#ffffff" stroke="#173126" stroke-width="4"/>
          <rect x="18" y="8" width="12" height="6" fill="#173126"/>
          <rect x="42" y="8" width="12" height="6" fill="#173126"/>
        </svg>
      `);

    const map = L.map('map', {
      zoomControl: false,
      attributionControl: true,
      preferCanvas: true,
    }).setView(SEOUL_CENTER, DEFAULT_ZOOM);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    let currentTheme = 'light';
    let tileLayer = createTileLayer(currentTheme).addTo(map);

    function createTileLayer(theme) {
      return L.tileLayer(STADIA_THEMES[theme], {
        maxZoom: 20,
        attribution:
          '&copy; <a href="https://stadiamaps.com/" target="_blank" rel="noreferrer">Stadia Maps</a> ' +
          '&copy; <a href="https://openmaptiles.org/" target="_blank" rel="noreferrer">OpenMapTiles</a> ' +
          '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">OpenStreetMap</a>',
      });
    }

    const stationLayer = L.layerGroup().addTo(map);
    const totemLayer = L.layerGroup().addTo(map);

    STATION_DATA.forEach((station) => {
      const marker = L.marker(station.latlng, {
        icon: L.divIcon({
          className: '',
          html: `
            <div class="station-marker">
              <div class="station-pin ${station.type}"></div>
              <div class="station-label">${station.name}<br>${station.available}대</div>
            </div>
          `,
          iconSize: [120, 56],
          iconAnchor: [60, 46],
        }),
      });

      marker.bindPopup(`${station.name}<br>대여 가능 ${station.available}대`);
      marker.addTo(stationLayer);
    });

    TOTEMS.forEach((totem) => {
      L.marker(totem.latlng, {
        icon: L.divIcon({
          className: '',
          html: '<div class="totem-marker"></div>',
          iconSize: [20, 20],
          iconAnchor: [10, 10],
        }),
        interactive: false,
      }).addTo(totemLayer);
    });

    const avatarMarker = L.marker(SEOUL_CENTER, {
      zIndexOffset: 1000,
      icon: L.divIcon({
        className: '',
        html: `
          <div class="avatar-marker">
            <div class="avatar-shadow"></div>
            <div class="avatar-glow"></div>
            <img class="avatar-image" src="${AVATAR_IMAGE}" alt="내 아바타">
          </div>
        `,
        iconSize: [68, 68],
        iconAnchor: [34, 52],
      }),
    }).addTo(map);

    const accuracyCircle = L.circle(SEOUL_CENTER, {
      radius: 0,
      color: '#42d77d',
      weight: 1,
      opacity: 0.4,
      fillColor: '#42d77d',
      fillOpacity: 0.08,
    }).addTo(map);

    const energyValue = document.getElementById('energyValue');
    const rideState = document.getElementById('rideState');
    const coordValue = document.getElementById('coordValue');
    const stationValue = document.getElementById('stationValue');
    const statusMessage = document.getElementById('statusMessage');
    const gpsMeta = document.getElementById('gpsMeta');
    const totemMeta = document.getElementById('totemMeta');
    const locateButton = document.getElementById('locateButton');
    const themeButton = document.getElementById('themeButton');
    const demoButton = document.getElementById('demoButton');

    let watchId = null;
    let hasFirstLock = false;
    let lastLatLng = null;
    let energy = 100;

    function formatCoords(latlng) {
      return `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
    }

    function getNearestItem(items, latlng) {
      return items
        .map((item) => ({
          ...item,
          distance: map.distance(latlng, item.latlng),
        }))
        .sort((a, b) => a.distance - b.distance)[0];
    }

    function setStatusForPosition(latlng, accuracy) {
      const nearestStation = getNearestItem(STATION_DATA, latlng);
      const nearestTotem = getNearestItem(TOTEMS, latlng);

      coordValue.textContent = formatCoords(latlng);
      stationValue.textContent = `${nearestStation.name} · ${Math.round(nearestStation.distance)}m`;
      gpsMeta.textContent = `GPS 정확도 ±${Math.round(accuracy)}m`;
      totemMeta.textContent = `${nearestTotem.name} ${Math.round(nearestTotem.distance)}m`;

      if (nearestStation.distance <= 120) {
        statusMessage.textContent = `${nearestStation.name} 근처입니다. 따릉이 인증 가능 구간에 진입했어요.`;
        rideState.textContent = '인증 가능';
      } else if (nearestTotem.distance <= 80) {
        statusMessage.textContent = `${nearestTotem.name}가 가까워요. 조금만 더 이동하면 채집이 열립니다.`;
        rideState.textContent = '토템 근접';
      } else {
        statusMessage.textContent = '근처 토템 탐색 중... 실제로 걸으면 지도와 아바타가 부드럽게 따라옵니다.';
        rideState.textContent = '이동 중';
      }
    }

    function updateEnergy(nextLatLng) {
      if (!lastLatLng) {
        lastLatLng = nextLatLng;
        return;
      }

      const movedMeters = map.distance(lastLatLng, nextLatLng);
      if (movedMeters >= 8) {
        energy += Math.max(1, Math.round(movedMeters / 15));
        energyValue.textContent = `${energy}⚡`;
        lastLatLng = nextLatLng;
      }
    }

    function updatePlayer(lat, lng, accuracy) {
      const nextLatLng = L.latLng(lat, lng);
      avatarMarker.setLatLng(nextLatLng);
      accuracyCircle.setLatLng(nextLatLng).setRadius(Math.max(accuracy, 10));
      updateEnergy(nextLatLng);
      setStatusForPosition(nextLatLng, accuracy);

      if (!hasFirstLock) {
        map.flyTo(nextLatLng, 17, {
          animate: true,
          duration: 1.4,
        });
        hasFirstLock = true;
      } else {
        map.panTo(nextLatLng, {
          animate: true,
          duration: 1.2,
          easeLinearity: 0.25,
        });
      }
    }

    function handleLocationError(message) {
      rideState.textContent = 'GPS 실패';
      statusMessage.textContent = message;
      gpsMeta.textContent = '위치 권한 확인 필요';
    }

    function startWatchingLocation() {
      if (!navigator.geolocation) {
        handleLocationError('이 브라우저는 GPS를 지원하지 않습니다.');
        return;
      }

      if (watchId != null) {
        navigator.geolocation.clearWatch(watchId);
      }

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          updatePlayer(
            position.coords.latitude,
            position.coords.longitude,
            position.coords.accuracy || 20
          );
        },
        () => {
          handleLocationError('위치 권한이 없거나 file 화면에서 GPS가 차단되었습니다. 위치 다시 요청 또는 localhost/https에서 열어보세요.');
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 1000,
        }
      );
    }

    locateButton.addEventListener('click', () => {
      rideState.textContent = 'GPS 요청 중';
      startWatchingLocation();
    });

    themeButton.addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      map.removeLayer(tileLayer);
      tileLayer = createTileLayer(currentTheme).addTo(map);
      themeButton.textContent = currentTheme === 'light' ? '다크 맵 전환' : '라이트 맵 전환';
    });

    demoButton.addEventListener('click', () => {
      updatePlayer(37.5663, 126.9779, 18);
      handleLocationError('샘플 위치로 전환했습니다. 실제 GPS 테스트는 모바일 브라우저 권한 허용 후 확인하세요.');
    });

    startWatchingLocation();
  </script>
</body>
</html>
