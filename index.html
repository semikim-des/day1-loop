<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>따릉몬 맵</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    @font-face {
      font-family: 'DungGeunMo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #f3f7f7;
      --card: rgba(255, 255, 255, 0.78);
      --line: rgba(19, 39, 31, 0.18);
      --text: #173126;
      --text-soft: #557065;
      --green: #42d77d;
      --green-deep: #1e9256;
      --blue: #74c8ff;
      --gold: #ffd55b;
      --danger: #ff857d;
      --shadow: 0 16px 36px rgba(18, 40, 30, 0.16);
      --blur: blur(18px);
      --right-safe-gap: max(20px, calc(env(safe-area-inset-right) + 20px));
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DungGeunMo', monospace;
      color: var(--text);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(116, 200, 255, 0.18), transparent 34%),
        radial-gradient(circle at bottom right, rgba(66, 215, 125, 0.16), transparent 34%);
      z-index: 0;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .leaflet-control-attribution {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px);
      border-radius: 10px 0 0 0;
      font-family: 'DungGeunMo', monospace;
      font-size: 9px;
      padding: 4px 6px;
    }

    .leaflet-control-zoom {
      border: 0;
      box-shadow: var(--shadow);
    }

    .leaflet-control-zoom a {
      border: 0;
      width: 38px;
      height: 38px;
      line-height: 38px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: var(--blur);
    }

    .map-overlay {
      position: absolute;
      z-index: 500;
      pointer-events: none;
    }

    .top-overlay {
      top: max(24px, calc(env(safe-area-inset-top) + 12px));
      left: 20px;
      width: auto;
      display: grid;
      gap: 12px;
      justify-items: start;
    }

    .top-right-overlay {
      top: max(24px, calc(env(safe-area-inset-top) + 12px));
      right: var(--right-safe-gap);
      width: auto;
    }

    .bottom-overlay {
      left: 20px;
      right: var(--right-safe-gap);
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 10px));
      min-height: 164px;
    }

    .floating-card {
      pointer-events: auto;
      background: var(--card);
      border: 1px solid var(--line);
      backdrop-filter: var(--blur);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .hud-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
    }

    .hud-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 62px;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(66, 215, 125, 0.18);
      color: var(--green-deep);
      font-size: 10px;
    }

    .summary-card {
      display: grid;
      gap: 4px;
      padding: 10px 12px;
      text-align: left;
    }

    .summary-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .profile-stack {
      display: grid;
      gap: 4px;
      justify-items: center;
      position: relative;
    }

    .rank-badge {
      width: 52px;
      height: 52px;
      border: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #fff4bc, #ffd55b);
      border: 1px solid rgba(209, 163, 0, 0.28);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.65);
      color: #8b6200;
      text-align: center;
      padding: 0;
    }

    .rank-badge-icon {
      font-size: 13px;
      line-height: 1;
    }

    .rank-badge-value {
      font-size: 10px;
      line-height: 1.1;
    }

    .profile-button {
      width: 46px;
      height: 46px;
      border: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
      overflow: hidden;
      padding: 0;
    }

    .profile-button img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .profile-menu {
      position: absolute;
      left: 0;
      bottom: calc(100% + 12px);
      width: 176px;
      display: grid;
      gap: 4px;
      padding: 8px;
      z-index: 30;
    }

    .profile-menu-header {
      display: grid;
      gap: 4px;
      padding: 4px 4px 8px;
    }

    .profile-menu-name {
      font-size: 9px;
      color: var(--text);
      line-height: 1.3;
    }

    .profile-menu-record {
      font-size: 8px;
      color: var(--text-soft);
      line-height: 1.4;
    }

    .profile-menu-code {
      font-size: 8px;
      color: var(--text-soft);
      line-height: 1.4;
    }

    .profile-menu-item {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 10px 12px;
      text-align: left;
      font-family: 'DungGeunMo', monospace;
      font-size: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.9);
    }

    .profile-menu-item.primary {
      background: rgba(66, 215, 125, 0.18);
      color: var(--green-deep);
    }

    .claim-card {
      position: absolute;
      left: 0;
      bottom: calc(100% + 12px);
      width: min(236px, calc(100vw - var(--right-safe-gap) - 40px));
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      z-index: 20;
    }

    .claim-card-title {
      font-size: 9px;
      color: var(--text-soft);
    }

    .claim-list {
      display: grid;
      gap: 6px;
      max-height: min(240px, 42vh);
      overflow: auto;
      padding-right: 2px;
    }

    .claim-list-empty {
      font-size: 8px;
      line-height: 1.5;
      color: var(--text-soft);
    }

    .claim-list-row {
      display: grid;
      grid-template-columns: 16px 1fr;
      gap: 6px;
      align-items: start;
      font-size: 8px;
    }

    .claim-list-rank {
      color: var(--text-soft);
      padding-top: 2px;
    }

    .claim-list-name {
      color: var(--text);
      line-height: 1.45;
      word-break: keep-all;
    }

    .claim-list-meta {
      margin-top: 2px;
      font-size: 7px;
      color: var(--text-soft);
      line-height: 1.45;
    }

    .summary-label {
      font-size: 8px;
      color: var(--text-soft);
    }

    .summary-value {
      font-size: 14px;
      color: var(--text);
      line-height: 1.2;
    }

    .summary-sub {
      font-size: 9px;
      color: var(--text-soft);
    }

    .summary-line {
      font-size: 9px;
      color: var(--text-soft);
      line-height: 1.4;
    }

    .hud-title {
      font-size: 8px;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    .hud-value {
      font-size: 11px;
      line-height: 1.45;
    }

    .sub-card {
      display: grid;
      gap: 6px;
      padding: 10px 12px;
    }

    .sub-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 8px;
      color: var(--text-soft);
    }

    .sub-row strong {
      color: var(--text);
      font-size: 9px;
      text-align: right;
      max-width: 58%;
    }

    .status-card {
      display: grid;
      gap: 6px;
      max-width: min(320px, calc(100vw - 120px));
      padding: 10px 14px;
      margin: 0 auto;
      border-radius: 999px;
    }

    .status-main {
      font-size: 9px;
      line-height: 1.5;
      text-align: center;
    }

    .leaderboard-card {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      width: min(236px, calc(100vw - 40px - var(--right-safe-gap)));
      position: absolute;
      left: 0;
      bottom: calc(100% + 12px);
    }

    .leaderboard-title {
      font-size: 9px;
      color: var(--text-soft);
    }

    .leaderboard-list {
      display: grid;
      gap: 6px;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 18px 28px 1fr auto;
      gap: 6px;
      align-items: center;
      font-size: 9px;
    }

    .leaderboard-rank {
      color: var(--text-soft);
    }

    .leaderboard-name {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard-avatar {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(23, 49, 38, 0.12);
      background: rgba(255, 255, 255, 0.92);
      overflow: hidden;
    }

    .leaderboard-avatar img {
      width: 20px;
      height: 20px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .leaderboard-score {
      color: #8b6200;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 10px;
      background: rgba(23, 49, 38, 0.08);
      color: var(--text-soft);
    }

    .bottom-left-cluster {
      position: absolute;
      left: 0;
      bottom: 0;
      display: grid;
      gap: 12px;
      justify-items: start;
      pointer-events: auto;
    }

    .bottom-center-cluster {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      pointer-events: auto;
    }

    .map-icon-button {
      width: 56px;
      height: 56px;
      border: 0;
      border-radius: 999px;
      display: grid;
      place-items: center;
      position: relative;
      color: var(--text);
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
      pointer-events: auto;
      font-family: 'DungGeunMo', monospace;
    }

    .station-trigger,
    .locate-trigger {
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.78);
    }

    .rank-trigger {
      background: linear-gradient(180deg, #fff4bc, #ffd55b);
      border: 1px solid rgba(209, 163, 0, 0.28);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.6), var(--shadow);
    }

    .profile-trigger {
      overflow: hidden;
    }

    .profile-trigger img {
      width: 30px;
      height: 30px;
      object-fit: contain;
      image-rendering: pixelated;
    }

    .icon-svg {
      width: 24px;
      height: 24px;
      display: block;
      color: var(--text);
    }

    .icon-svg * {
      vector-effect: non-scaling-stroke;
    }

    .rank-trigger .icon-svg {
      color: #8b6200;
    }

    .icon-badge {
      position: absolute;
      right: -2px;
      bottom: -2px;
      min-width: 26px;
      height: 26px;
      padding: 0 6px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(23, 49, 38, 0.92);
      color: #fff;
      font-size: 8px;
      box-shadow: 0 6px 12px rgba(18, 40, 30, 0.22);
    }

    .panel-title {
      font-size: 9px;
      color: var(--text-soft);
    }

    .panel-value {
      font-size: 11px;
      color: var(--text);
      line-height: 1.45;
    }

    .panel-subrow {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      font-size: 8px;
      color: var(--text-soft);
    }

    .panel-subrow strong {
      max-width: 58%;
      text-align: right;
      font-size: 9px;
      color: var(--text);
    }

    .panel-chip {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(66, 215, 125, 0.18);
      color: var(--green-deep);
      font-size: 9px;
    }

    .station-panel {
      width: min(252px, calc(100vw - 40px - var(--right-safe-gap)));
      display: grid;
      gap: 8px;
      padding: 12px 14px;
    }

    .claim-orb {
      border: 0;
      background: transparent;
      position: relative;
      display: grid;
      justify-items: center;
      gap: 8px;
      padding: 0 6px 4px;
      pointer-events: auto;
    }

    .claim-orb-core {
      width: 52px;
      height: 66px;
      display: grid;
      place-items: end center;
      position: relative;
      filter: drop-shadow(0 12px 18px rgba(18, 40, 30, 0.22));
    }

    .claim-orb-core::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 46px;
      height: 12px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(18, 40, 30, 0.16);
      z-index: 0;
    }

    .claim-flag-icon {
      width: 42px;
      height: 58px;
      display: block;
      color: var(--green-deep);
      position: relative;
      z-index: 1;
    }

    .claim-orb-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      min-height: 30px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      font-family: 'DungGeunMo', monospace;
      font-size: 9px;
      color: var(--text);
      line-height: 1;
    }

    .profile-name {
      display: none;
    }

    .is-hidden {
      display: none !important;
    }

    .action-button.is-hidden {
      display: none;
    }

    .mini-button {
      border: 0;
      border-radius: 12px;
      padding: 8px 10px;
      font-family: 'DungGeunMo', monospace;
      font-size: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow);
    }

    .avatar-marker {
      position: relative;
      width: 48px;
      height: 48px;
    }

    .avatar-shadow {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: rgba(66, 215, 125, 0.18);
      box-shadow: 0 0 0 10px rgba(66, 215, 125, 0.12);
    }

    .avatar-center {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.96);
      background: var(--green);
      box-shadow: 0 6px 16px rgba(24, 49, 39, 0.24);
    }

    .avatar-image {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -90%);
      object-fit: contain;
      image-rendering: pixelated;
      filter: drop-shadow(0 6px 10px rgba(23, 49, 38, 0.18));
      pointer-events: none;
    }

    .station-marker {
      transform: translate(-50%, -80%);
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .station-pin {
      width: 22px;
      height: 22px;
      border-radius: 999px;
      border: 3px solid rgba(255, 255, 255, 0.92);
      box-shadow: 0 8px 18px rgba(24, 49, 39, 0.16);
    }

    .station-pin.regular {
      background: var(--green);
    }

    .station-pin.sprout {
      background: var(--blue);
    }

    .station-label {
      max-width: 112px;
      padding: 6px 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
      font-size: 9px;
      text-align: center;
      color: var(--text);
      box-shadow: 0 8px 20px rgba(24, 49, 39, 0.12);
    }

    .station-label.claimed {
      border: 1px solid rgba(209, 163, 0, 0.28);
      background: rgba(255, 247, 212, 0.92);
    }

    .station-owner {
      margin-top: 3px;
      font-size: 8px;
      color: #8b6200;
    }

    .gate-overlay {
      position: absolute;
      inset: 0;
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(18, 40, 30, 0.18);
      backdrop-filter: blur(8px);
    }

    .gate-overlay.is-hidden {
      display: none;
    }

    .gate-card {
      width: min(320px, calc(100vw - 32px));
      display: grid;
      gap: 10px;
      padding: 18px 16px;
      pointer-events: auto;
    }

    .gate-title {
      font-size: 14px;
    }

    .gate-copy,
    .gate-message {
      font-size: 9px;
      line-height: 1.5;
      color: var(--text-soft);
    }

    .gate-message {
      min-height: 14px;
      color: #a34d46;
    }

    .code-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 13px;
      font-family: 'DungGeunMo', monospace;
      font-size: 11px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.92);
    }

    .gate-submit-button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 13px 16px;
      font-family: 'DungGeunMo', monospace;
      font-size: 11px;
      color: #0f2e22;
      background: linear-gradient(180deg, rgba(66, 215, 125, 0.92), rgba(44, 181, 101, 0.94));
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.36),
        0 10px 18px rgba(18, 40, 30, 0.18);
    }

    .gate-submit-button:active {
      transform: translateY(1px);
    }

    @media (max-width: 480px) {
      .top-overlay {
        left: 20px;
      }

      .top-right-overlay {
        right: var(--right-safe-gap);
      }

      .station-panel {
        width: min(220px, calc(100vw - 40px - var(--right-safe-gap)));
      }

      .panel-subrow {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .panel-subrow strong {
        max-width: 100%;
        text-align: left;
      }

      .status-card {
        max-width: min(240px, calc(100vw - 96px));
      }

      .leaderboard-card {
        width: min(220px, calc(100vw - 40px - var(--right-safe-gap)));
      }

      .profile-menu {
        width: 156px;
      }

      .claim-card {
        width: min(220px, calc(100vw - 40px - var(--right-safe-gap)));
      }

      .claim-orb-core {
        width: 48px;
        height: 60px;
      }

      .claim-flag-icon {
        width: 38px;
        height: 54px;
      }

      .claim-orb-label {
        min-width: 72px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="map-overlay top-overlay">
      <button class="map-icon-button station-trigger" id="stationInfoButton" type="button" aria-label="가까운 대여소 보기">
        <svg class="icon-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="7" cy="17" r="3" fill="none" stroke="currentColor" stroke-width="1.9"/>
          <circle cx="17" cy="17" r="3" fill="none" stroke="currentColor" stroke-width="1.9"/>
          <path d="M7 17l4-7h3l3 7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11 10L9 7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
          <path d="M14 10l2-3" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
          <path d="M5 7h5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
        </svg>
      </button>

      <section class="floating-card station-panel is-hidden" id="stationInfoCard">
        <div class="panel-title">가까운 대여소</div>
        <div class="panel-value" id="stationValue">탐색 중...</div>
        <div class="panel-subrow">
          <span>현재 위치</span>
          <strong id="coordValue">주변 확인 전</strong>
        </div>
        <div class="panel-subrow">
          <span>근처 대여소 수</span>
          <strong id="nearbyCount">0개</strong>
        </div>
        <div class="panel-chip" id="rideState">위치 대기</div>
      </section>
    </div>

    <div class="map-overlay top-right-overlay">

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js"></script>
  <script>
    const SEOUL_CENTER = [37.5665, 126.9780];
    const DEFAULT_ZOOM = 16;
    const DISPLAY_RADIUS_METERS = 1800;
    const TILE_URL = 'https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png';
    const OFFICIAL_STATION_API = 'https://www.bikeseoul.com/app/station/getStationRealtimeStatus.do';
    const STATION_CACHE_KEY = 'ddarungmon-station-cache';
    const PLAYER_STATS_KEY = 'ddarungmon-player-stats';
    const PLAYER_SESSION_KEY = 'ddarungmon-player-session';
    const SUPABASE_URL = window.__SUPABASE_CONFIG__?.url || '';
    const SUPABASE_ANON_KEY = window.__SUPABASE_CONFIG__?.anonKey || '';
    const hasSupabaseConfig = Boolean(SUPABASE_URL && SUPABASE_ANON_KEY);
    const DEFAULT_PRESET_MEMBERS = [
      { nickname: '테스트 라이더', code: '1111' },
      { nickname: '잠실스프린터', code: '2222' },
      { nickname: '강남페달러', code: '3333' },
      { nickname: '송파부스터', code: '4444' },
    ];

    const AVATAR_IMAGE =
      "data:image/svg+xml;charset=UTF-8," +
      encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
          <rect width="72" height="72" fill="none"/>
          <circle cx="21" cy="54" r="9" fill="#ffffff" stroke="#173126" stroke-width="4"/>
          <circle cx="51" cy="54" r="9" fill="#ffffff" stroke="#173126" stroke-width="4"/>
          <path d="M21 54 L31 40 L43 40 L51 54" fill="none" stroke="#173126" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M31 40 L25 31" fill="none" stroke="#173126" stroke-width="4" stroke-linecap="round"/>
          <path d="M42 40 L47 33" fill="none" stroke="#173126" stroke-width="4" stroke-linecap="round"/>
          <path d="M16 31 L27 31" fill="none" stroke="#173126" stroke-width="4" stroke-linecap="round"/>
          <rect x="24" y="14" width="24" height="20" rx="10" fill="#f6f1e7" stroke="#173126" stroke-width="4"/>
          <circle cx="27" cy="16" r="5" fill="#f6f1e7" stroke="#173126" stroke-width="4"/>
          <circle cx="45" cy="16" r="5" fill="#f6f1e7" stroke="#173126" stroke-width="4"/>
          <rect x="28" y="30" width="16" height="12" rx="5" fill="#42d77d" stroke="#173126" stroke-width="4"/>
          <path d="M33 35 L27 45" fill="none" stroke="#173126" stroke-width="4" stroke-linecap="round"/>
          <path d="M40 35 L47 46" fill="none" stroke="#173126" stroke-width="4" stroke-linecap="round"/>
          <path d="M31 31 L24 24" fill="none" stroke="#173126" stroke-width="4" stroke-linecap="round"/>
          <path d="M41 31 L46 25" fill="none" stroke="#173126" stroke-width="4" stroke-linecap="round"/>
        </svg>
      `);

    const map = L.map('map', {
      zoomControl: false,
      attributionControl: true,
      preferCanvas: true,
    }).setView(SEOUL_CENTER, DEFAULT_ZOOM);

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    L.tileLayer(TILE_URL, {
      maxZoom: 20,
      attribution:
        '&copy; <a href="https://carto.com/" target="_blank" rel="noreferrer">CARTO</a> ' +
        '&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noreferrer">OpenStreetMap</a>',
      subdomains: 'abcd',
    }).addTo(map);

    const stationLayer = L.layerGroup().addTo(map);
    const claimLayer = L.layerGroup().addTo(map);

    const avatarMarker = L.marker(SEOUL_CENTER, {
      zIndexOffset: 1000,
      icon: L.divIcon({
        className: '',
        html: `
          <div class="avatar-marker">
            <div class="avatar-shadow"></div>
            <div class="avatar-center"></div>
            <img class="avatar-image" src="${AVATAR_IMAGE}" alt="내 아바타">
          </div>
        `,
        iconSize: [48, 48],
        iconAnchor: [24, 24],
      }),
    }).addTo(map);

    const rideState = document.getElementById('rideState');
    const coordValue = document.getElementById('coordValue');
    const stationValue = document.getElementById('stationValue');
    const statusMessage = document.getElementById('statusMessage');
    const nearbyCount = document.getElementById('nearbyCount');
    const stationInfoButton = document.getElementById('stationInfoButton');
    const stationInfoCard = document.getElementById('stationInfoCard');
    const authButton = document.getElementById('authButton');
    const locateButton = document.getElementById('locateButton');
    const myRankValue = document.getElementById('myRankValue');
    const myRecordLine = document.getElementById('myRecordLine');
    const leaderboardToggleButton = document.getElementById('leaderboardToggleButton');
    const leaderboardCard = document.getElementById('leaderboardCard');
    const leaderboardList = document.getElementById('leaderboardList');
    const profileMenuButton = document.getElementById('profileMenuButton');
    const profileMenu = document.getElementById('profileMenu');
    const claimedStationsButton = document.getElementById('claimedStationsButton');
    const changeNicknameButton = document.getElementById('changeNicknameButton');
    const claimListCard = document.getElementById('claimListCard');
    const claimListTitle = document.getElementById('claimListTitle');
    const claimList = document.getElementById('claimList');
    const profileAvatarImage = document.getElementById('profileAvatarImage');
    const profileNameValue = document.getElementById('profileNameValue');
    const profileCodeValue = document.getElementById('profileCodeValue');
    const gateOverlay = document.getElementById('gateOverlay');
    const accessCodeInput = document.getElementById('accessCodeInput');
    const accessButton = document.getElementById('accessButton');
    const gateMessage = document.getElementById('gateMessage');
    const app = document.getElementById('app');

    let watchId = null;
    let hasFirstLock = false;
    let lastLatLng = null;
    let stationData = [];
    let stationLoadState = 'idle';
    let currentNearestStation = null;
    let currentPlayer = null;
    let supabaseClient = null;
    let realtimeChannel = null;
    let memberDirectory = [...DEFAULT_PRESET_MEMBERS];

    if (hasSupabaseConfig && window.supabase?.createClient) {
      supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    let playerStats = loadPlayerStats();

    function loadPlayerStats() {
      if (supabaseClient) {
        return {};
      }

      try {
        const raw = localStorage.getItem(PLAYER_STATS_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (error) {
        console.error(error);
        return {};
      }
    }

    function savePlayerStats() {
      if (supabaseClient) {
        return;
      }

      localStorage.setItem(PLAYER_STATS_KEY, JSON.stringify(playerStats));
    }

    function normalizeCode(value) {
      return value.trim().toUpperCase();
    }

    function findMemberByCode(code) {
      return memberDirectory.find((member) => member.code === normalizeCode(code)) || null;
    }

    function getPlayerRecord(code) {
      if (!playerStats[code]) {
        const member = findMemberByCode(code);
        playerStats[code] = {
          code,
          nickname: member ? member.nickname : '라이더',
          uniqueStations: [],
          totalCheckins: 0,
          lastCheckinAt: null,
        };
      }

      return playerStats[code];
    }

    function getCurrentNickname() {
      return currentPlayer ? getPlayerRecord(currentPlayer.code).nickname : '';
    }

    function buildPlayerStatsFromRows(players, claims) {
      const nextMembers = (players || []).map((player) => ({
        code: player.code,
        nickname: player.nickname,
        avatar: player.avatar || null,
      }));

      memberDirectory = nextMembers.length ? nextMembers : [...DEFAULT_PRESET_MEMBERS];

      const nextStats = {};
      memberDirectory.forEach((member) => {
        nextStats[member.code] = {
          code: member.code,
          nickname: member.nickname,
          uniqueStations: [],
          totalCheckins: 0,
          lastCheckinAt: null,
        };
      });

      (claims || []).forEach((claim) => {
        if (!nextStats[claim.owner_code]) {
          nextStats[claim.owner_code] = {
            code: claim.owner_code,
            nickname: claim.owner_code,
            uniqueStations: [],
            totalCheckins: 0,
            lastCheckinAt: null,
          };
        }

        nextStats[claim.owner_code].uniqueStations.push(claim.station_id);
        nextStats[claim.owner_code].totalCheckins += 1;
        nextStats[claim.owner_code].lastCheckinAt = claim.claimed_at;
      });

      playerStats = nextStats;

      if (currentPlayer) {
        const refreshedPlayer = findMemberByCode(currentPlayer.code);
        if (refreshedPlayer) {
          currentPlayer = refreshedPlayer;
        }
      }
    }

    function refreshUiFromState() {
      renderClaimZones();
      renderLeaderboard();
      updatePlayerHud();
      syncActionButtons();

      if (lastLatLng) {
        setStatusForPosition(lastLatLng);
      }
    }

    async function loadRemoteGameState() {
      if (!supabaseClient) {
        return false;
      }

      const [{ data: players, error: playersError }, { data: claims, error: claimsError }] =
        await Promise.all([
          supabaseClient.from('players').select('code, nickname, avatar, created_at').order('created_at', { ascending: true }),
          supabaseClient.from('claims').select('station_id, station_name, owner_code, claimed_at').order('claimed_at', { ascending: true }),
        ]);

      if (playersError || claimsError) {
        console.error(playersError || claimsError);
        statusMessage.textContent = 'Supabase 공용 저장을 읽지 못해 로컬 화면 상태로 머물러 있어요.';
        return false;
      }

      buildPlayerStatsFromRows(players, claims);
      refreshUiFromState();
      return true;
    }

    function subscribeRemoteGameState() {
      if (!supabaseClient || realtimeChannel) {
        return;
      }

      realtimeChannel = supabaseClient
        .channel('ddarungmon-sync')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'players' }, () => {
          loadRemoteGameState();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'claims' }, () => {
          loadRemoteGameState();
        })
        .subscribe();
    }

    function getAvatarTone(code) {
      const digits = code.replace(/\D/g, '');
      const seed = Number(digits || '0');
      const hues = ['#c8f0d8', '#d4ecff', '#ffe3b7', '#f7d6e8'];
      return hues[seed % hues.length];
    }

    function loadStationCache() {
      try {
        const raw = localStorage.getItem(STATION_CACHE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch (error) {
        console.error(error);
        return [];
      }
    }

    function saveStationCache(stations) {
      localStorage.setItem(STATION_CACHE_KEY, JSON.stringify(stations));
    }

    function setGateVisible(visible) {
      gateOverlay.classList.toggle('is-hidden', !visible);
    }

    function getLeaderboard() {
      return memberDirectory
        .map((member) => {
          const record = getPlayerRecord(member.code);
          return {
            code: member.code,
            nickname: record.nickname,
            uniqueCount: record.uniqueStations.length,
            totalCheckins: record.totalCheckins,
          };
        })
        .sort((a, b) => {
          if (b.uniqueCount !== a.uniqueCount) {
            return b.uniqueCount - a.uniqueCount;
          }

          return b.totalCheckins - a.totalCheckins;
        });
    }

    function getStationOwner(stationId) {
      const owner = memberDirectory.find((member) => getPlayerRecord(member.code).uniqueStations.includes(stationId));
      return owner ? getPlayerRecord(owner.code).nickname : null;
    }

    function buildClaimPolygon(latlng, radiusMeters = 92) {
      const baseLat = Array.isArray(latlng) ? latlng[0] : latlng.lat;
      const baseLng = Array.isArray(latlng) ? latlng[1] : latlng.lng;
      const angles = [-90, -28, 35, 95, 155, 212, 270, 330];

      return angles.map((angle) => {
        const radians = (angle * Math.PI) / 180;
        const latOffset = (radiusMeters * Math.sin(radians)) / 111320;
        const lngOffset =
          (radiusMeters * Math.cos(radians)) /
          (111320 * Math.cos((baseLat * Math.PI) / 180));

        return [baseLat + latOffset, baseLng + lngOffset];
      });
    }

    function renderClaimZones() {
      claimLayer.clearLayers();

      stationData.forEach((station) => {
        const owner = getStationOwner(station.id);

        if (!owner) {
          return;
        }

        L.polygon(buildClaimPolygon(station.latlng), {
          color: '#d1a300',
          weight: 2,
          opacity: 0.9,
          fillColor: '#ffd55b',
          fillOpacity: 0.18,
        }).addTo(claimLayer);
      });
    }

    function renderLeaderboard() {
      const leaderboard = getLeaderboard();

      leaderboardList.innerHTML = leaderboard
        .slice(0, 8)
        .map(
          (entry, index) => `
            <div class="leaderboard-row">
              <div class="leaderboard-rank">${index + 1}.</div>
              <div class="leaderboard-avatar" style="background:${getAvatarTone(entry.code)};">
                <img src="${AVATAR_IMAGE}" alt="${entry.nickname} 아바타">
              </div>
              <div class="leaderboard-name">${entry.nickname}</div>
              <div class="leaderboard-score">${entry.uniqueCount}곳</div>
            </div>
          `
        )
        .join('');
    }

    function getClaimedStationEntries() {
      if (!currentPlayer) {
        return [];
      }

      const record = getPlayerRecord(currentPlayer.code);

      return record.uniqueStations.map((stationId) => {
        const station = stationData.find((item) => item.id === stationId);

        return {
          id: stationId,
          name: station ? cleanStationName(station.name) : `대여소 ${stationId}`,
          originalName: station ? station.name : `대여소 ${stationId}`,
        };
      });
    }

    function renderClaimList() {
      const claimedStations = getClaimedStationEntries();
      claimListTitle.textContent = `내 점령 대여소 ${claimedStations.length}곳`;

      if (!claimedStations.length) {
        claimList.innerHTML = `<div class="claim-list-empty">아직 점령한 대여소가 없어요. 120m 안에서 대여소를 점령해보세요.</div>`;
        return;
      }

      claimList.innerHTML = claimedStations
        .map(
          (station, index) => `
            <div class="claim-list-row">
              <div class="claim-list-rank">${index + 1}.</div>
              <div>
                <div class="claim-list-name">${station.name}</div>
                <div class="claim-list-meta">${station.originalName}</div>
              </div>
            </div>
          `
        )
        .join('');
    }

    function updatePlayerHud() {
      profileAvatarImage.src = AVATAR_IMAGE;
      renderClaimList();

      if (!currentPlayer) {
        profileNameValue.textContent = '미입장';
        profileCodeValue.textContent = '현재 코드 : -';
        myRankValue.textContent = '-';
        myRecordLine.textContent = '내기록 : 0곳 점령';
        return;
      }

      const leaderboard = getLeaderboard();
      const myRank = leaderboard.findIndex((entry) => entry.code === currentPlayer.code) + 1;
      const record = getPlayerRecord(currentPlayer.code);

      profileNameValue.textContent = record.nickname;
      profileCodeValue.textContent = `현재 코드 : ${currentPlayer.code}`;
      myRankValue.textContent = myRank > 0 ? `${myRank}` : '-';
      myRecordLine.textContent = `내기록 : ${record.uniqueStations.length}곳 점령`;
    }

    async function promptNicknameChange() {
      if (!currentPlayer) {
        statusMessage.textContent = '먼저 고유번호로 입장한 뒤 닉네임을 바꿀 수 있어요.';
        return;
      }

      const record = getPlayerRecord(currentPlayer.code);
      const previousNickname = record.nickname;
      const nextNickname = window.prompt('변경할 닉네임을 입력해주세요.', record.nickname)?.trim();

      if (!nextNickname) {
        return;
      }

      record.nickname = nextNickname;
      const currentMember = memberDirectory.find((member) => member.code === currentPlayer.code);
      if (currentMember) {
        currentMember.nickname = nextNickname;
      }

      renderLeaderboard();
      updatePlayerHud();
      profileMenu.classList.add('is-hidden');
      statusMessage.textContent = `닉네임이 ${nextNickname}(으)로 변경됐어요.`;

      if (supabaseClient) {
        const { data, error } = await supabaseClient
          .from('players')
          .update({ nickname: nextNickname })
          .eq('code', currentPlayer.code)
          .select('code, nickname')
          .maybeSingle();

        if (error || !data) {
          record.nickname = previousNickname;
          if (currentMember) {
            currentMember.nickname = previousNickname;
          }
          renderLeaderboard();
          updatePlayerHud();
          console.error(error);
          statusMessage.textContent = '닉네임을 Supabase에 저장하지 못했어요. 잠시 후 다시 시도해주세요.';
          return;
        }

        await loadRemoteGameState();
      } else {
        record.nickname = nextNickname;
        savePlayerStats();
      }
    }

    function closeFloatingMenus(options = {}) {
      const {
        keepStationInfo = false,
        keepLeaderboard = false,
        keepProfileMenu = false,
        keepClaimList = false,
      } = options;

      if (!keepStationInfo) {
        stationInfoCard.classList.add('is-hidden');
      }

      if (!keepLeaderboard) {
        leaderboardCard.classList.add('is-hidden');
      }

      if (!keepProfileMenu) {
        profileMenu.classList.add('is-hidden');
      }

      if (!keepClaimList) {
        claimListCard.classList.add('is-hidden');
      }
    }

    function cleanStationName(name) {
      return String(name || '')
        .replace(/^\d+\.\s*/, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function formatNearbyLabel(station) {
      if (!station) {
        return '주변 탐색 중';
      }

      const cleanedName = cleanStationName(station.name);
      return cleanedName ? `${cleanedName} 근처` : '주변 탐색 중';
    }

    function normalizeStations(realtimeList) {
      return realtimeList
        .map((station) => {
          const lat = Number(station.stationLatitude);
          const lng = Number(station.stationLongitude);
          const available =
            Number(station.parkingBikeTotCnt || 0) +
            Number(station.parkingQRBikeCnt || 0) +
            Number(station.parkingELECBikeCnt || 0);

          if (!Number.isFinite(lat) || !Number.isFinite(lng)) {
            return null;
          }

          return {
            id: station.stationId,
            name: station.stationName,
            type: station.stationSeCd === 'RAK_001' ? 'regular' : 'sprout',
            available,
            latlng: [lat, lng],
          };
        })
        .filter(Boolean);
    }

    function getNearestItem(items, latlng) {
      if (!items.length) {
        return null;
      }

      return items
        .map((item) => ({
          ...item,
          distance: map.distance(latlng, item.latlng),
        }))
        .sort((a, b) => a.distance - b.distance)[0];
    }

    function syncActionButtons() {
      if (!currentPlayer || !currentNearestStation) {
        authButton.classList.add('is-hidden');
        return;
      }

      if (getStationOwner(currentNearestStation.id)) {
        authButton.classList.add('is-hidden');
        return;
      }

      const record = getPlayerRecord(currentPlayer.code);
      const alreadyChecked = record.uniqueStations.includes(currentNearestStation.id);

      if (currentNearestStation.distance <= 120 && !alreadyChecked) {
        authButton.classList.remove('is-hidden');
        return;
      }

      authButton.classList.add('is-hidden');
    }

    async function fetchOfficialStations() {
      stationLoadState = 'loading';
      stationValue.textContent = '공식 데이터 불러오는 중...';
      nearbyCount.textContent = '-';
      statusMessage.textContent = '따릉이 공식 대여소 데이터를 가져오는 중입니다.';
      currentNearestStation = null;
      syncActionButtons();

      try {
        let response = null;
        let lastError = null;

        for (let attempt = 0; attempt < 2; attempt += 1) {
          try {
            response = await fetch(OFFICIAL_STATION_API, {
              method: 'POST',
              mode: 'cors',
              headers: {
                'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8',
              },
              body: new URLSearchParams({
                stationGrpSeq: 'ALL',
                tabId: '',
              }).toString(),
            });

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            break;
          } catch (error) {
            lastError = error;

            if (attempt === 0) {
              await new Promise((resolve) => window.setTimeout(resolve, 700));
            }
          }
        }

        if (!response) {
          throw lastError || new Error('공식 데이터 응답 없음');
        }

        const data = await response.json();
        const realtimeList = Array.isArray(data.realtimeList) ? data.realtimeList : [];
        stationData = normalizeStations(realtimeList);
        saveStationCache(stationData);

        stationLoadState = 'ready';
        renderClaimZones();
        renderLeaderboard();
        updatePlayerHud();
        syncActionButtons();
      } catch (error) {
        const cachedStations = loadStationCache();

        stationData = Array.isArray(cachedStations) ? cachedStations : [];
        currentNearestStation = null;
        stationLayer.clearLayers();

        if (stationData.length) {
          stationLoadState = 'ready';
          stationValue.textContent = '캐시된 대여소 사용 중';
          nearbyCount.textContent = `${stationData.length}개`;
          statusMessage.textContent = '공식 대여소 실시간 연결이 잠시 끊겨서, 마지막으로 받아둔 대여소 데이터를 보여주고 있어요.';
          renderClaimZones();
        } else {
          stationLoadState = 'error';
          stationValue.textContent = '공식 데이터 연결 실패';
          nearbyCount.textContent = '0개';
          statusMessage.textContent = '공식 따릉이 대여소 데이터를 불러오지 못했습니다. file 화면이나 앱 내 웹뷰 정책 때문에 잠시 막힐 수 있어요.';
        }

        renderLeaderboard();
        updatePlayerHud();
        syncActionButtons();
        console.error(error);
      }
    }

    function renderStationsAround(latlng) {
      stationLayer.clearLayers();

      if (!stationData.length) {
        return;
      }

      const sortedStations = stationData
        .map((station) => ({
          ...station,
          distance: map.distance(latlng, station.latlng),
        }))
        .sort((a, b) => a.distance - b.distance);

      const visibleStations = sortedStations.filter((station) => station.distance <= DISPLAY_RADIUS_METERS);
      const stationsToRender = (visibleStations.length > 0 ? visibleStations : sortedStations.slice(0, 10)).slice(0, 12);

      stationsToRender.forEach((station, index) => {
        const owner = getStationOwner(station.id);
        const marker = L.marker(station.latlng, {
          icon: L.divIcon({
            className: '',
            html: `
              <div class="station-marker">
                <div class="station-pin ${station.type}"></div>
                <div class="station-label ${owner ? 'claimed' : ''}">
                  ${station.name}<br>${Math.round(station.distance)}m · ${station.available}대
                  ${owner ? `<div class="station-owner">${owner} 점령</div>` : ''}
                </div>
              </div>
            `,
            iconSize: [126, 56],
            iconAnchor: [63, 46],
          }),
          zIndexOffset: index === 0 ? 300 : 0,
        });

        marker.bindPopup(
          `${station.name}<br>내 위치에서 ${Math.round(station.distance)}m<br>대여 가능 ${station.available}대` +
          `${owner ? `<br>점령자 ${owner}` : ''}`
        );
        marker.addTo(stationLayer);
      });
    }

    function setStatusForPosition(latlng) {
      if (stationLoadState === 'loading') {
        coordValue.textContent = '주변 대여소 확인 중';
        rideState.textContent = '대여소 동기화중';
        stationValue.textContent = '공식 데이터 불러오는 중...';
        nearbyCount.textContent = '-';
        statusMessage.textContent = '공식 따릉이 대여소 데이터를 불러오는 중입니다.';
        return;
      }

      if (stationLoadState === 'error' || !stationData.length) {
        coordValue.textContent = '주변 위치 확인됨';
        rideState.textContent = '위치 확인됨';
        stationValue.textContent = '공식 데이터 없음';
        nearbyCount.textContent = '0개';
        statusMessage.textContent = '내 위치는 잡혔지만 공식 따릉이 대여소 데이터를 아직 연결하지 못했습니다.';
        return;
      }

      const nearestStation = getNearestItem(stationData, latlng);
      const stationsInRange = stationData.filter((station) => map.distance(latlng, station.latlng) <= DISPLAY_RADIUS_METERS);
      renderStationsAround(latlng);
      renderClaimZones();
      currentNearestStation = nearestStation;
      coordValue.textContent = formatNearbyLabel(nearestStation);
      const owner = getStationOwner(nearestStation.id);
      stationValue.textContent = `${nearestStation.name} · ${Math.round(nearestStation.distance)}m`;
      nearbyCount.textContent = `${stationsInRange.length}개`;

      if (nearestStation.distance <= 120 && currentPlayer) {
        const record = getPlayerRecord(currentPlayer.code);
        const alreadyChecked = record.uniqueStations.includes(nearestStation.id);
        statusMessage.textContent = alreadyChecked
          ? `${nearestStation.name}은 이미 ${record.nickname}이 점령한 거점이에요.`
          : owner
            ? `${nearestStation.name}은 현재 ${owner}의 땅이에요.`
            : `${nearestStation.name} 근처입니다. 바로 점령할 수 있어요.`;
        rideState.textContent = alreadyChecked ? '내 거점' : owner ? '점령지 발견' : '점령 가능';
      } else {
        statusMessage.textContent = `${Math.round(nearestStation.distance)}m 앞에 ${nearestStation.name}가 있어요. 가까운 대여소만 지도에 표시 중입니다.`;
        rideState.textContent = '위치 이동 중';
      }

      syncActionButtons();
    }

    function updatePlayer(lat, lng, accuracy) {
      const nextLatLng = L.latLng(lat, lng);
      const movedDistance = lastLatLng ? map.distance(lastLatLng, nextLatLng) : Infinity;

      avatarMarker.setLatLng(nextLatLng);
      setStatusForPosition(nextLatLng);

      if (!hasFirstLock) {
        map.flyTo(nextLatLng, 17, {
          animate: true,
          duration: 1.4,
        });
        hasFirstLock = true;
      } else if (movedDistance >= 4 || accuracy <= 25) {
        map.panTo(nextLatLng, {
          animate: true,
          duration: 0.8,
          easeLinearity: 0.25,
        });
      }

      lastLatLng = nextLatLng;
    }

    function handleLocationError(message) {
      rideState.textContent = '위치 실패';
      statusMessage.textContent = message;
      currentNearestStation = null;
      syncActionButtons();
    }

    function startWatchingLocation() {
      if (!navigator.geolocation) {
        handleLocationError('이 브라우저는 GPS를 지원하지 않습니다.');
        return;
      }

      if (watchId != null) {
        navigator.geolocation.clearWatch(watchId);
      }

      navigator.geolocation.getCurrentPosition(
        (position) => {
          updatePlayer(
            position.coords.latitude,
            position.coords.longitude,
            position.coords.accuracy || 20
          );
        },
        () => {},
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0,
        }
      );

      watchId = navigator.geolocation.watchPosition(
        (position) => {
          updatePlayer(
            position.coords.latitude,
            position.coords.longitude,
            position.coords.accuracy || 20
          );
        },
        () => {
          handleLocationError('위치 권한이 없거나 file 화면에서 GPS가 차단되었습니다. 위치 다시 요청 또는 localhost/https에서 열어보세요.');
        },
        {
          enableHighAccuracy: true,
          timeout: 15000,
          maximumAge: 0,
        }
      );
    }

    stationInfoButton.addEventListener('click', (event) => {
      event.stopPropagation();
      const willOpen = stationInfoCard.classList.contains('is-hidden');
      closeFloatingMenus({ keepStationInfo: willOpen });
      stationInfoCard.classList.toggle('is-hidden', !willOpen);
    });

    locateButton.addEventListener('click', () => {
      rideState.textContent = '위치 요청 중';
      if (stationLoadState !== 'ready') {
        fetchOfficialStations();
      }
      startWatchingLocation();
    });

    authButton.addEventListener('click', async () => {
      if (!currentNearestStation || currentNearestStation.distance > 120) {
        statusMessage.textContent = '점령 버튼은 대여소 120m 안에 들어왔을 때만 활성화돼요.';
        syncActionButtons();
        return;
      }

      if (!currentPlayer) {
        statusMessage.textContent = '고유번호를 입력해 라이더로 입장한 뒤 점령할 수 있어요.';
        syncActionButtons();
        return;
      }

      if (getStationOwner(currentNearestStation.id)) {
        statusMessage.textContent = `${currentNearestStation.name}은 이미 ${getStationOwner(currentNearestStation.id)}가 점령했어요.`;
        syncActionButtons();
        return;
      }

      const record = getPlayerRecord(currentPlayer.code);
      if (record.uniqueStations.includes(currentNearestStation.id)) {
        statusMessage.textContent = `${currentNearestStation.name}은 이미 내가 점령한 대여소예요.`;
        syncActionButtons();
        return;
      }

      if (supabaseClient) {
        const { error } = await supabaseClient.from('claims').insert({
          station_id: currentNearestStation.id,
          station_name: currentNearestStation.name,
          lat: currentNearestStation.latlng[0],
          lng: currentNearestStation.latlng[1],
          owner_code: currentPlayer.code,
        });

        if (error) {
          console.error(error);
          statusMessage.textContent =
            error.code === '23505'
              ? `${currentNearestStation.name}은 방금 다른 라이더가 먼저 점령했어요.`
              : '점령 내용을 Supabase에 저장하지 못했어요. 잠시 후 다시 시도해주세요.';
          await loadRemoteGameState();
          syncActionButtons();
          return;
        }

        await loadRemoteGameState();
      }

      if (!supabaseClient) {
        record.uniqueStations.push(currentNearestStation.id);
        record.totalCheckins += 1;
        record.lastCheckinAt = new Date().toISOString();
      }
      savePlayerStats();
      renderClaimZones();
      renderLeaderboard();
      updatePlayerHud();
      rideState.textContent = '점령 완료';
      statusMessage.textContent = `${currentNearestStation.name} 점령 완료. 현재 점령자는 ${getCurrentNickname()}입니다.`;
      syncActionButtons();
    });

    function restoreSession() {
      currentPlayer = null;
      localStorage.removeItem(PLAYER_SESSION_KEY);
    }

    async function attemptAccess() {
      if (supabaseClient && !memberDirectory.length) {
        await loadRemoteGameState();
      }

      const member = findMemberByCode(accessCodeInput.value);

      if (!member) {
        gateMessage.textContent = '등록되지 않은 고유번호예요. 다시 확인해주세요.';
        return;
      }

      currentPlayer = member;
      getPlayerRecord(member.code);
      savePlayerStats();
      gateMessage.textContent = '';
      accessCodeInput.value = '';
      setGateVisible(false);
      renderLeaderboard();
      updatePlayerHud();
      syncActionButtons();
      statusMessage.textContent = `${getCurrentNickname()} (${currentPlayer.code})로 입장했어요.`;

      if (lastLatLng) {
        setStatusForPosition(lastLatLng);
      }
    }

    accessButton.addEventListener('click', () => {
      attemptAccess();
    });
    accessCodeInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        attemptAccess();
      }
    });

    leaderboardToggleButton.addEventListener('click', (event) => {
      event.stopPropagation();
      const willOpen = leaderboardCard.classList.contains('is-hidden');
      closeFloatingMenus({ keepLeaderboard: willOpen });
      leaderboardCard.classList.toggle('is-hidden', !willOpen);
    });

    profileMenuButton.addEventListener('click', (event) => {
      event.stopPropagation();
      const willOpen = profileMenu.classList.contains('is-hidden');
      closeFloatingMenus({ keepProfileMenu: willOpen });
      profileMenu.classList.toggle('is-hidden', !willOpen);
    });

    claimedStationsButton.addEventListener('click', () => {
      renderClaimList();
      const willOpen = claimListCard.classList.contains('is-hidden');
      closeFloatingMenus({ keepClaimList: willOpen });
      claimListCard.classList.toggle('is-hidden', !willOpen);
    });

    changeNicknameButton.addEventListener('click', promptNicknameChange);

    document.addEventListener('click', (event) => {
      const clickedInsideFloatingUi =
        stationInfoButton.contains(event.target) ||
        stationInfoCard.contains(event.target) ||
        leaderboardToggleButton.contains(event.target) ||
        leaderboardCard.contains(event.target) ||
        profileMenuButton.contains(event.target) ||
        profileMenu.contains(event.target) ||
        claimListCard.contains(event.target);

      if (!clickedInsideFloatingUi) {
        closeFloatingMenus();
      }
    });

    async function initializeApp() {
      restoreSession();
      setGateVisible(!currentPlayer);
      renderLeaderboard();
      updatePlayerHud();

      if (hasSupabaseConfig) {
        statusMessage.textContent = 'Supabase 공용 저장소와 동기화하는 중입니다.';
        await loadRemoteGameState();
        subscribeRemoteGameState();
      } else {
        statusMessage.textContent = 'Supabase anon key를 supabase-config.js에 넣으면 공용 저장 연결을 시작할 수 있어요.';
      }

      fetchOfficialStations();
      startWatchingLocation();
    }

    if (!hasSupabaseConfig) {
      statusMessage.textContent = 'Supabase anon key를 supabase-config.js에 넣으면 공용 저장 연결을 시작할 수 있어요.';
    }
    initializeApp();
  </script>
</body>
</html>
