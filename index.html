<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>따릉몬: 에너토피아</title>
  <style>
    @font-face {
      font-family: 'DungGeunMo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      --bg: #eef4e8;
      --panel: #f9fff4;
      --panel-soft: #dbead1;
      --line: #1c2e1f;
      --text: #18271b;
      --text-soft: #426347;
      --green: #3fd56e;
      --green-deep: #1e8d4d;
      --mint: #baf1c9;
      --gold: #f5cb57;
      --pink: #ff8cbc;
      --blue: #7ccaf8;
      --danger: #ff7b74;
      --shadow: 4px 4px 0 #1c2e1f;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DungGeunMo', monospace;
    }

    body {
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
    }

    #root {
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const STORAGE_KEY = 'ddarungmon_progress_v2';

    const INTRO_STORY = [
      {
        title: '정전',
        body: '화석 연료가 바닥난 뒤, 픽셀 시티의 전력은 완전히 멈췄습니다. 거리의 불빛도, 대여소의 신호도 모두 꺼졌습니다.',
      },
      {
        title: '발전기',
        body: '남은 건 단 하나. 라이더가 페달을 밟을 때 생기는 에너지뿐입니다. 따릉이를 타는 사람만이 도시를 다시 점등할 수 있습니다.',
      },
      {
        title: '출격',
        body: '이제 당신은 동호회의 신입 라이더입니다. 닉네임을 등록하고, 실제 따릉이 대여소 근처에서 인증해 첫 전력을 공급하세요.',
      },
    ];

    const STATIONS = [
      {
        id: 'cityhall',
        code: '102',
        name: '서울광장 대여소',
        lat: 37.5663,
        lng: 126.9779,
        mapX: 222,
        mapY: 74,
        bikeType: '일반 따릉이',
        available: 9,
        racks: 17,
      },
      {
        id: 'seongsu',
        code: '214',
        name: '성수역 대여소',
        lat: 37.5446,
        lng: 127.0557,
        mapX: 82,
        mapY: 132,
        bikeType: '새싹 따릉이',
        available: 4,
        racks: 12,
      },
      {
        id: 'yeouido',
        code: '307',
        name: '여의나루 대여소',
        lat: 37.5271,
        lng: 126.9326,
        mapX: 154,
        mapY: 176,
        bikeType: '일반 따릉이',
        available: 13,
        racks: 20,
      },
    ];

    const STEP_ORDER = ['intro', 'nickname', 'gps', 'receipt'];

    const STEP_LABELS = {
      intro: '인트로',
      nickname: '닉네임',
      gps: 'GPS 인증',
      receipt: '인증샷 이벤트',
    };

    const INITIAL_COLLECTIBLES = [
      {
        id: 'acorn',
        name: '황금 도토리',
        reward: '희귀 코스튬 파편',
        points: 35,
        energy: 20,
        lat: 37.5657,
        lng: 126.9792,
        color: '#f5cb57',
      },
      {
        id: 'gear',
        name: '네온 기어',
        reward: '속도 버프 칩',
        points: 25,
        energy: 16,
        lat: 37.5453,
        lng: 127.0541,
        color: '#7ccaf8',
      },
      {
        id: 'leaf',
        name: '새싹 배터리',
        reward: '에너지 충전 팩',
        points: 20,
        energy: 28,
        lat: 37.5279,
        lng: 126.9341,
        color: '#3fd56e',
      },
    ];

    const MAP_WIDTH = 280;
    const MAP_HEIGHT = 240;

    const WORLD_BOUNDS = {
      minLat: 37.524,
      maxLat: 37.5695,
      minLng: 126.928,
      maxLng: 127.06,
    };

    const calculateDistance = (lat1, lon1, lat2, lon2) => {
      const R = 6371000;
      const dLat = (lat2 - lat1) * (Math.PI / 180);
      const dLon = (lon2 - lon1) * (Math.PI / 180);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * (Math.PI / 180)) *
          Math.cos(lat2 * (Math.PI / 180)) *
          Math.sin(dLon / 2) *
          Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    };

    const geoToMapPosition = (lat, lng) => {
      const xRatio = (lng - WORLD_BOUNDS.minLng) / (WORLD_BOUNDS.maxLng - WORLD_BOUNDS.minLng);
      const yRatio = (WORLD_BOUNDS.maxLat - lat) / (WORLD_BOUNDS.maxLat - WORLD_BOUNDS.minLat);

      return {
        x: Math.min(MAP_WIDTH - 18, Math.max(18, 18 + xRatio * (MAP_WIDTH - 36))),
        y: Math.min(MAP_HEIGHT - 18, Math.max(18, 18 + yRatio * (MAP_HEIGHT - 36))),
      };
    };

    const getRandomEvent = () => {
      const roll = Math.random();

      if (roll < 0.1) {
        return {
          title: '황금 도토리 획득',
          body: '희귀 코스튬 교환권 조각을 얻었습니다. 동호회 내 자랑용으로 딱 좋은 초희귀 드롭입니다.',
          color: '#f5cb57',
          points: 120,
        };
      }

      if (roll < 0.45) {
        return {
          title: '강풍 주의보 버프',
          body: '역풍을 이겨낸 라이더 판정으로 추가 가점이 적용됩니다.',
          color: '#7ccaf8',
          points: 70,
        };
      }

      return {
        title: '화이트 네온 정비',
        body: '따릉이 프레임 정비 보너스로 다음 주행 점수가 안정적으로 누적됩니다.',
        color: '#3fd56e',
        points: 40,
      };
    };

    function PixelBike() {
      return (
        <div style={styles.pixelWrap}>
          <div style={styles.pixelWheelLeft} />
          <div style={styles.pixelWheelRight} />
          <div style={styles.pixelFrameMain} />
          <div style={styles.pixelFrameDown} />
          <div style={styles.pixelFrameSeat} />
          <div style={styles.pixelHandle} />
          <div style={styles.pixelSeat} />
          <div style={styles.pixelRiderHead} />
          <div style={styles.pixelRiderBody} />
          <div style={styles.pixelRiderArm} />
          <div style={styles.pixelRiderLeg} />
          <div style={styles.pixelBag} />
        </div>
      );
    }

    function GameApp() {
      const savedProgress = React.useMemo(() => {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        } catch (error) {
          return null;
        }
      }, []);

      const [step, setStep] = React.useState(savedProgress?.step || 'intro');
      const [introIndex, setIntroIndex] = React.useState(savedProgress?.introIndex || 0);
      const [nickname, setNickname] = React.useState(savedProgress?.nickname || '');
      const [nicknameInput, setNicknameInput] = React.useState(savedProgress?.nickname || '');
      const [userLocation, setUserLocation] = React.useState(null);
      const [locationError, setLocationError] = React.useState('');
      const [stationQuery, setStationQuery] = React.useState('');
      const [stationStatus, setStationStatus] = React.useState(() => STATIONS.map((station) => ({ ...station })));
      const [spriteFrame, setSpriteFrame] = React.useState(0);
      const [collectibles, setCollectibles] = React.useState(
        savedProgress?.collectibles || INITIAL_COLLECTIBLES.map((item) => ({ ...item, found: false }))
      );
      const [inventory, setInventory] = React.useState(savedProgress?.inventory || []);
      const [score, setScore] = React.useState(savedProgress?.score || 0);
      const [energy, setEnergy] = React.useState(savedProgress?.energy || 0);
      const [gpsChecked, setGpsChecked] = React.useState(savedProgress?.gpsChecked || false);
      const [receiptFile, setReceiptFile] = React.useState(null);
      const [eventReward, setEventReward] = React.useState(savedProgress?.eventReward || null);
      const [activityLog, setActivityLog] = React.useState(
        savedProgress?.activityLog || ['시스템 준비 완료. 첫 주행 인증을 기다리는 중입니다.']
      );

      React.useEffect(() => {
        const watchId = navigator.geolocation?.watchPosition(
          (position) => {
            setUserLocation({
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            });
            setLocationError('');
            setSpriteFrame((prev) => (prev + 1) % 2);
          },
          () => {
            setLocationError('위치 권한이 없거나 브라우저가 file 화면의 GPS를 막고 있습니다.');
          },
          {
            enableHighAccuracy: true,
            timeout: 6000,
            maximumAge: 1500,
          }
        );

        if (!navigator.geolocation) {
          setLocationError('이 브라우저는 GPS를 지원하지 않습니다.');
        }

        return () => {
          if (watchId != null && navigator.geolocation) {
            navigator.geolocation.clearWatch(watchId);
          }
        };
      }, []);

      React.useEffect(() => {
        localStorage.setItem(
          STORAGE_KEY,
          JSON.stringify({
            step,
            introIndex,
            nickname,
            score,
            energy,
            collectibles,
            inventory,
            gpsChecked,
            eventReward,
            activityLog,
          })
        );
      }, [step, introIndex, nickname, score, energy, collectibles, inventory, gpsChecked, eventReward, activityLog]);

      React.useEffect(() => {
        if (step !== 'intro' && !nickname.trim()) {
          setStep('nickname');
        }
      }, [step, nickname]);

      const requestLocationNow = () => {
        if (!navigator.geolocation) {
          setLocationError('이 브라우저는 GPS를 지원하지 않습니다.');
          return;
        }

        navigator.geolocation.getCurrentPosition(
          (position) => {
            setUserLocation({
              lat: position.coords.latitude,
              lng: position.coords.longitude,
            });
            setLocationError('');
          },
          () => {
            setLocationError('위치 권한이 없거나 브라우저에서 GPS 요청을 거부했습니다.');
          },
          {
            enableHighAccuracy: true,
            timeout: 6000,
            maximumAge: 0,
          }
        );
      };

      const stationsWithDistance = stationStatus.map((station) => {
        if (!userLocation) {
          return { ...station, distance: null };
        }

        return {
          ...station,
          distance: calculateDistance(userLocation.lat, userLocation.lng, station.lat, station.lng),
        };
      }).sort((a, b) => {
        if (a.distance == null) return 1;
        if (b.distance == null) return -1;
        return a.distance - b.distance;
      });

      const nearestStation = stationsWithDistance[0];
      const canCheckGps = nearestStation?.distance != null && nearestStation.distance <= 120;
      const filteredStations = stationsWithDistance.filter((station) =>
        station.name.toLowerCase().includes(stationQuery.trim().toLowerCase())
      );
      const sceneStations = filteredStations.map((station) => ({
        ...station,
        spriteDistance: station.distance,
        screenPos: geoToMapPosition(station.lat, station.lng),
      }));
      const sceneCollectibles = collectibles.map((item) => ({
        ...item,
        spriteDistance:
          userLocation && !item.found
            ? calculateDistance(userLocation.lat, userLocation.lng, item.lat, item.lng)
            : null,
        screenPos: geoToMapPosition(item.lat, item.lng),
      }));
      const nearestCollectible = [...sceneCollectibles]
        .filter((item) => !item.found)
        .sort((a, b) => (a.spriteDistance ?? Infinity) - (b.spriteDistance ?? Infinity))[0];
      const canCollectItem = nearestCollectible?.spriteDistance != null && nearestCollectible.spriteDistance <= 35;
      const avatarPos = userLocation
        ? geoToMapPosition(userLocation.lat, userLocation.lng)
        : { x: 36, y: 188 };

      const appendLog = (message) => {
        setActivityLog((prev) => [message, ...prev].slice(0, 5));
      };

      const handleRefreshStations = () => {
        setStationStatus((prev) =>
          prev.map((station) => {
            const diff = Math.floor(Math.random() * 5) - 2;
            const available = Math.max(0, Math.min(station.racks, station.available + diff));
            return { ...station, available };
          })
        );
        appendLog('대여소 실시간 현황을 새로고침했습니다.');
      };

      const handleCollectItem = () => {
        if (!canCollectItem) {
          return;
        }

        setCollectibles((prev) =>
          prev.map((item) =>
            item.id === nearestCollectible.id ? { ...item, found: true } : item
          )
        );
        setInventory((prev) => [...prev, { name: nearestCollectible.name, reward: nearestCollectible.reward }]);
        setScore((prev) => prev + nearestCollectible.points);
        setEnergy((prev) => prev + nearestCollectible.energy);
        appendLog(`${nearestCollectible.name} 채집 성공. ${nearestCollectible.reward}을(를) 획득했습니다.`);
      };

      const handleIntroNext = () => {
        if (introIndex < INTRO_STORY.length - 1) {
          setIntroIndex((prev) => prev + 1);
          return;
        }

        setStep('nickname');
      };

      const handleNicknameSubmit = () => {
        const trimmed = nicknameInput.trim();
        if (!trimmed) {
          return;
        }

        setNickname(trimmed);
        setStep('gps');
        appendLog(`${trimmed} 라이더 등록 완료. 첫 대여소 인증 미션이 열렸습니다.`);
      };

      const handleGpsCheck = () => {
        if (!canCheckGps || gpsChecked) {
          return;
        }

        setScore((prev) => prev + 100);
        setEnergy((prev) => prev + 60);
        setGpsChecked(true);
        setStep('receipt');
        appendLog(`${nearestStation.name} 근처 인증 성공. 주행 가점 100점이 반영되었습니다.`);
      };

      const handleReceiptUpload = () => {
        if (!receiptFile) {
          return;
        }

        const reward = getRandomEvent();
        setEventReward(reward);
        setScore((prev) => prev + reward.points);
        setEnergy((prev) => prev + Math.round(reward.points / 2));
        appendLog(`결제 인증샷 등록 완료. 이벤트 '${reward.title}' 발동.`);
      };

      const resetProgress = () => {
        localStorage.removeItem(STORAGE_KEY);
        window.location.reload();
      };

      const introCard = INTRO_STORY[introIndex];
      const currentStepIndex = STEP_ORDER.indexOf(step);

      return (
        <div style={styles.app}>
          <main style={styles.shell}>
            <header style={styles.header}>
              <div>
                <div style={styles.eyebrow}>DDARUNGMON</div>
                <h1 style={styles.title}>에너토피아</h1>
              </div>
              <div style={styles.headerRight}>
                <div style={styles.sceneIndicator}>SCENE {currentStepIndex + 1}</div>
              <button style={styles.resetButton} onClick={resetProgress}>
                리셋
              </button>
              </div>
            </header>

            {step === 'intro' && (
              <section style={styles.scenePanel}>
                <div style={styles.storyScene}>
                  <div style={styles.storyVisual}>
                    <PixelBike />
                  </div>
                  <div style={styles.storyTag}>스토리 시작</div>
                  <h2 style={styles.sceneTitle}>{introCard.title}</h2>
                  <p style={styles.sceneBody}>{introCard.body}</p>
                  <div style={styles.storyPager}>
                    {INTRO_STORY.map((_, index) => (
                      <span
                        key={index}
                        style={{
                          ...styles.storyPagerDot,
                          background: index === introIndex ? '#3fd56e' : '#d1ddcb',
                        }}
                      />
                    ))}
                  </div>
                  <button style={styles.primaryButton} onClick={handleIntroNext}>
                    {introIndex < INTRO_STORY.length - 1 ? '다음 장면' : '닉네임 설정하러 가기'}
                  </button>
                </div>
              </section>
            )}

            {step === 'nickname' && (
              <section style={styles.scenePanel}>
                <div style={styles.storyScene}>
                  <div style={styles.storyVisualCompact}>
                    <PixelBike />
                  </div>
                <div style={styles.storyTag}>캐릭터 등록</div>
                <h2 style={styles.sceneTitle}>라이더 닉네임 설정</h2>
                <p style={styles.sceneBody}>
                  동호회 랭킹과 이벤트 로그에 표시될 이름입니다. 짧고 기억에 남는 이름이 좋습니다.
                </p>
                <input
                  type="text"
                  value={nicknameInput}
                  onChange={(event) => setNicknameInput(event.target.value)}
                  onKeyDown={(event) => {
                    if (event.key === 'Enter' && nicknameInput.trim()) {
                      handleNicknameSubmit();
                    }
                  }}
                  placeholder="예: 성수픽서, 한강왕"
                  style={styles.textInput}
                  maxLength={12}
                />
                <button
                  style={{
                    ...styles.primaryButton,
                    opacity: nicknameInput.trim() ? 1 : 0.45,
                  }}
                  onClick={handleNicknameSubmit}
                  disabled={!nicknameInput.trim()}
                >
                  닉네임 확정
                </button>
                </div>
              </section>
            )}

            {step === 'gps' && (
              <section style={styles.scenePanel}>
                <div style={styles.missionHud}>
                  <div style={styles.heroName}>{nickname ? `${nickname} 라이더` : '신입 라이더'}</div>
                  <div style={styles.heroStats}>
                    <span>점수 {score}P</span>
                    <span>에너지 {energy}EP</span>
                  </div>
                </div>
                <section style={styles.panel}>
                <div style={styles.storyTag}>첫 미션</div>
                <h2 style={styles.panelTitle}>돌아다니다가 대여소를 만나면 인증</h2>
                <p style={styles.panelBody}>
                  이 씬은 포켓몬고처럼 직접 돌아다니는 단계입니다. 캐릭터를 움직여 대여소에 닿으면 인증할 수 있고, 길가에 숨어 있는 반짝 아이템을 주우면 새로운 보상을 획득합니다.
                </p>

                <div style={styles.mapSceneCard}>
                  <div style={styles.mapSceneHeader}>
                    <span>라이딩 필드</span>
                    <span>{canCheckScene ? '대여소 접근 완료' : '대여소와 아이템을 찾아 이동'}</span>
                  </div>
                  <div style={styles.mapScene}>
                    {sceneStations.map((station) => (
                      <div
                        key={station.id}
                        style={{
                          ...styles.mapStation,
                          left: station.mapX - 14,
                          top: station.mapY - 14,
                          background: station.bikeType === '일반 따릉이' ? '#3fd56e' : '#7ccaf8',
                          boxShadow: station.spriteDistance <= 26 ? '0 0 0 4px rgba(63,213,110,0.25)' : 'none',
                        }}
                      >
                        P
                      </div>
                    ))}
                    {sceneCollectibles.filter((item) => !item.found).map((item) => (
                      <div
                        key={item.id}
                        style={{
                          ...styles.collectibleNode,
                          left: item.mapX - 10,
                          top: item.mapY - 10,
                          background: item.color,
                          boxShadow: item.spriteDistance <= 24 ? '0 0 0 4px rgba(245,203,87,0.25)' : 'none',
                        }}
                      >
                        ✦
                      </div>
                    ))}
                    <div style={{ ...styles.mapPath, left: 36, top: 172, width: 188 }} />
                    <div style={{ ...styles.mapPath, left: 138, top: 88, width: 10, height: 106 }} />
                    <div style={{ ...styles.mapPath, left: 82, top: 126, width: 74 }} />
                    <div
                      style={{
                        ...styles.mapSprite,
                        left: spritePos.x - 12,
                        top: spritePos.y - 18,
                      }}
                    >
                      <div style={styles.mapSpriteBike} />
                      <div style={styles.mapSpriteHead} />
                      <div
                        style={{
                          ...styles.mapSpriteBody,
                          transform: spriteFrame === 0 ? 'translateY(0)' : 'translateY(2px)',
                        }}
                      />
                    </div>
                  </div>

                  <div style={styles.sceneHint}>
                    방향키 또는 아래 버튼으로 캐릭터를 움직이세요. 대여소 픽셀 옆까지 가면 인증이 열리고, 반짝이는 아이템 옆에 가면 채집이 가능합니다.
                  </div>

                  <div style={styles.controlPad}>
                    <button style={styles.controlButton} onClick={() => moveSprite(0, -10)}>▲</button>
                    <div style={styles.controlPadRow}>
                      <button style={styles.controlButton} onClick={() => moveSprite(-10, 0)}>◀</button>
                      <button style={styles.controlButton} onClick={() => moveSprite(10, 0)}>▶</button>
                    </div>
